                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Password Baru</label>
                                        <input type="text" value={newUser.password} onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:bg-white focus:border-indigo-400 rounded-2xl font-black outline-none transition-all text-sm" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Tingkat Otoritas</label>
                                        <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:bg-white focus:border-indigo-500 rounded-2xl font-black outline-none cursor-pointer appearance-none text-sm">
                                            <option value="ADMIN">Super Admin</option><option value="STAFF">Staf Gudang</option>
                                        </select>
                                    </div>
                                    <button onClick={async ()=>{await apiCall({action: isEditUserMode ? 'edit_user' : 'add_user', ...newUser}); setIsUserModalOpen(false); setCustomAlert("Akses diperbarui.");}} className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs hover:bg-indigo-700">Konfirmasi Akses</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-8 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-20 h-20 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="trash-2" size={40}/></div>
                                <h3 className="font-black text-2xl mb-2 tracking-tight italic uppercase">Hapus Barang?</h3>
                                <p className="text-slate-500 text-sm mb-8 leading-relaxed font-medium">Data yang sudah dihapus tidak dapat dikembalikan. Laporan lama akan kehilangan referensi nama.</p>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteTarget(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={hapusMaster} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-bold uppercase text-xs tracking-widest shadow-xl shadow-rose-200 hover:bg-rose-700 transition-colors">Ya, Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteUserTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-8 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-20 h-20 bg-orange-50 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="users" size={40}/></div>
                                <h3 className="font-black text-2xl mb-2 tracking-tight italic uppercase">Cabut Akses?</h3>
                                <p className="text-slate-500 text-sm mb-8 leading-relaxed font-medium">Hapus perijinan akses untuk <strong>{deleteUserTarget}</strong>?</p>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteUserTarget(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={async ()=>{await apiCall({action: 'delete_user', username: deleteUserTarget}); setDeleteUserTarget(null); setCustomAlert("Akses dicabut.");}} className="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold uppercase text-xs tracking-widest shadow-xl shadow-orange-200 hover:bg-orange-700 transition-colors">Ya, Cabut</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-8 md:p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icon name="info" size={40} /></div>
                                <h3 className="font-black text-slate-800 text-2xl mb-3 tracking-tight italic uppercase">Informasi Sistem</h3>
                                <p className="text-slate-500 text-sm font-medium mb-8 leading-relaxed">{customAlert}</p>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-xs tracking-widest shadow-xl hover:bg-black transition-all">Mengerti</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
