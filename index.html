<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grosir Pintar POS v2.5</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML5 QRCode Scanner untuk Kamera HP/iPad -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Style adjustments for HTML5 QR Code Scanner */
        #reader button { padding: 10px 20px; background-color: #4f46e5; color: white; border-radius: 12px; font-weight: 800; margin: 4px; cursor: pointer; border: none; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;}
        #reader select { padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 10px; width: 100%; font-weight: bold; outline: none;}
        #reader a { display: none !important; } /* Hide watermark */
        #reader { border: none !important; }
        #reader video { border-radius: 16px; object-fit: cover; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            // --- KONFIGURASI URL API ---
            // MASUKKAN URL DEPLOYMENT GOOGLE APPS SCRIPT ANDA DI SINI
            const API_URL = "https://script.google.com/macros/s/AKfycbwolB1qiZh8mTgngPufaSiYHfu8LcDYBf_kQjueOxAme-ADXZq8WGS6xEYiB0ilfMSQ/exec";

            const [currentUser, setCurrentUser] = useState(localStorage.getItem('pos_user') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('pos_role') || 'ADMIN');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pos_user'));
            const [loginName, setLoginName] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('pos_role') === 'STAFF' ? 'opname' : 'dashboard');
            const [liveData, setLiveData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(true);
            const [isCheckingSystem, setIsCheckingSystem] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            const syncRef = useRef(false);

            // STATE FORM & MODAL
            const [scanBarcode, setScanBarcode] = useState('');
            const [scanType, setScanType] = useState('IN');
            const [adjustDir, setAdjustDir] = useState('MINUS');
            const [scanQty, setScanQty] = useState(1);
            const [scanUom, setScanUom] = useState('Bungkus');
            const [scanNote, setScanNote] = useState('');
            
            const [opnameBarcode, setOpnameBarcode] = useState('');
            const [opnameQty, setOpnameQty] = useState('');
            const [opnameUom, setOpnameUom] = useState('Bal'); // Default Bal
            
            const [detectedItem, setDetectedItem] = useState(null);
            const [scanSuggestions, setScanSuggestions] = useState([]);
            
            const [opnameItem, setOpnameItem] = useState(null);
            const [opnameSuggestions, setOpnameSuggestions] = useState([]);

            // State Input Inline Tabel Opname
            const [inlineOpnameQty, setInlineOpnameQty] = useState({});
            const [inlineOpnameUom, setInlineOpnameUom] = useState({});

            // Fitur Sortir & Paginasi Stok Opname
            const [sortConfigOpname, setSortConfigOpname] = useState({ key: 'name', direction: 'asc' });
            const [currentPageOpname, setCurrentPageOpname] = useState(1);
            const itemsPerPageOpname = 50; // Ringan untuk ribuan data

            const [filterDate, setFilterDate] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [activeReportTab, setActiveReportTab] = useState('mutasi');
            const [kartuStokItem, setKartuStokItem] = useState('');

            const [customAlert, setCustomAlert] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [deleteUserTarget, setDeleteUserTarget] = useState(null);
            const [isAddMasterOpen, setIsAddMasterOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [newMaster, setNewMaster] = useState({ idBarang: '', namaBarang: '', barcodeBungkus: '', barcodeSlop: '', barcodeBal: '', isiSlop: 12, isiBal: 10, stokAwal: 0 });
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [isEditUserMode, setIsEditUserMode] = useState(false);
            const [newUser, setNewUser] = useState({ oldUsername: '', username: '', password: '', role: 'STAFF' });

            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState(null); 
            const scannerRef = useRef(null);

            const barcodeInputRef = useRef(null);

            // --- DATA FETCHING (AUTO-REFRESH DIKURANGI JADI 30 DETIK) ---
            const fetchData = async (silent = false) => {
                if (!API_URL.startsWith("http")) { setIsSyncing(false); return; }
                if (syncRef.current && silent) return; 
                
                syncRef.current = true;
                if (!silent) setIsLoading(true);
                setIsSyncing(true);
                
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setLiveData(data);
                } catch (e) { console.error("Auto-sync error:", e); }
                finally { 
                    setIsLoading(false); setIsSyncing(false); setIsCheckingSystem(false); syncRef.current = false;
                }
            };

            useEffect(() => { 
                fetchData(); 
                const interval = setInterval(() => { fetchData(true); }, 30000); // 30 DETIK UNTUK MENCEGAH LAG
                return () => clearInterval(interval);
            }, []);

            // --- LOGIKA PENDETEKSI KAMERA ---
            useEffect(() => {
                if (isScannerOpen) {
                    const formats = window.Html5QrcodeSupportedFormats ? [
                        window.Html5QrcodeSupportedFormats.EAN_13, window.Html5QrcodeSupportedFormats.EAN_8,
                        window.Html5QrcodeSupportedFormats.UPC_A, window.Html5QrcodeSupportedFormats.UPC_E,
                        window.Html5QrcodeSupportedFormats.CODE_128, window.Html5QrcodeSupportedFormats.CODE_39,
                        window.Html5QrcodeSupportedFormats.QR_CODE
                    ] : undefined;

                    const html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 10, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0, formatsToSupport: formats }, false
                    );
                    scannerRef.current = html5QrcodeScanner;
                    
                    html5QrcodeScanner.render((decodedText) => {
                        if (scannerTarget === 'mutasi') setScanBarcode(decodedText);
                        else if (scannerTarget === 'opname') setOpnameBarcode(decodedText);
                        else if (scannerTarget === 'master_bungkus') setNewMaster(prev => ({ ...prev, barcodeBungkus: decodedText }));
                        else if (scannerTarget === 'master_slop') setNewMaster(prev => ({ ...prev, barcodeSlop: decodedText }));
                        else if (scannerTarget === 'master_bal') setNewMaster(prev => ({ ...prev, barcodeBal: decodedText }));
                        
                        try { navigator.vibrate && navigator.vibrate(200); } catch(e){}
                        html5QrcodeScanner.clear(); setIsScannerOpen(false);
                    }, (error) => {});
                }
                return () => { if (scannerRef.current) scannerRef.current.clear().catch(e => console.error(e)); };
            }, [isScannerOpen, scannerTarget]);

            const findItemExact = (inputStr) => {
                const clean = String(inputStr).trim().toLowerCase();
                if (!clean || !liveData?.masterItems) return null;
                for (let item of liveData.masterItems) {
                    if (String(item.bBungkus).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                    if (String(item.bSlop).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Slop' };
                    if (String(item.bBal).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.name).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.id).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                }
                return null;
            };

            useEffect(() => {
                const found = findItemExact(scanBarcode);
                setDetectedItem(found);
                if(found) { setScanUom(found.defaultUom); setScanSuggestions([]); } 
                else {
                    const lowerInput = scanBarcode.toLowerCase().trim();
                    if(lowerInput.length > 0) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput) || String(i.bBungkus).includes(lowerInput)
                        ).slice(0, 5) || [];
                        setScanSuggestions(suggestions);
                    } else { setScanSuggestions([]); }
                }
            }, [scanBarcode, liveData]);

            useEffect(() => {
                const found = findItemExact(opnameBarcode);
                setOpnameItem(found);
                if(found) { setOpnameUom(found.defaultUom); setOpnameSuggestions([]); } 
                else {
                    const lowerInput = opnameBarcode.toLowerCase().trim();
                    if(lowerInput.length > 0) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput) || String(i.bBungkus).includes(lowerInput)
                        ).slice(0, 5) || [];
                        setOpnameSuggestions(suggestions);
                    } else { setOpnameSuggestions([]); }
                }
            }, [opnameBarcode, liveData]);

            // --- FILTER & SORTING ---
            useEffect(() => { setCurrentPageOpname(1); }, [searchTerm, activeMenu]);

            const filteredMasterItems = (liveData?.masterItems || []).filter(i => 
                i.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                i.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                String(i.bBungkus).includes(searchTerm)
            );

            // Logika Sortir Stok Opname
            let sortedOpnameItems = [...filteredMasterItems];
            if (sortConfigOpname.key) {
                sortedOpnameItems.sort((a, b) => {
                    if (sortConfigOpname.key === 'name') {
                        return sortConfigOpname.direction === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
                    }
                    if (sortConfigOpname.key === 'status') {
                        const aVal = a.opnamedToday ? 1 : 0;
                        const bVal = b.opnamedToday ? 1 : 0;
                        return sortConfigOpname.direction === 'asc' ? aVal - bVal : bVal - aVal;
                    }
                    if (sortConfigOpname.key === 'stok') {
                        return sortConfigOpname.direction === 'asc' ? a.stok - b.stok : b.stok - a.stok;
                    }
                    return 0;
                });
            }

            // Logika Paginasi (Pagination)
            const totalPagesOpname = Math.ceil(sortedOpnameItems.length / itemsPerPageOpname) || 1;
            const currentOpnameItems = sortedOpnameItems.slice((currentPageOpname - 1) * itemsPerPageOpname, currentPageOpname * itemsPerPageOpname);

            const handleSortOpname = (key) => {
                let direction = 'asc';
                if (sortConfigOpname.key === key && sortConfigOpname.direction === 'asc') direction = 'desc';
                setSortConfigOpname({ key, direction });
            };
            
            const filteredTransactions = (liveData?.transactions || []).filter(t => {
                const mSearch = t.item.toLowerCase().includes(searchTerm.toLowerCase()) || t.user.toLowerCase().includes(searchTerm.toLowerCase());
                const mDate = filterDate ? t.date === filterDate : true;
                let mType = true;
                if (filterType === 'IN') mType = t.type === 'IN' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'OUT') mType = t.type === 'OUT' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'ADJUST') mType = t.id.startsWith('OPN-') || t.note.includes('ADJUST');
                return mSearch && mDate && mType;
            });

            const filteredLowStock = (liveData?.lowStock || []).filter(item => item.name.toLowerCase().includes(searchTerm.toLowerCase()));

            const getKartuStokData = () => {
                if (!kartuStokItem) return [];
                const selectedItemData = liveData?.masterItems?.find(i => i.id === kartuStokItem);
                if (!selectedItemData) return [];
                let currentSisa = selectedItemData.stok || 0;
                const logs = [...(liveData?.transactions || [])].filter(t => t.item === selectedItemData.name);
                return logs.map(trx => {
                    let qtyBase = Number(trx.qty);
                    if (trx.uom === 'Bal') qtyBase = Number(trx.qty) * selectedItemData.isiSlop * selectedItemData.isiBal;
                    if (trx.uom === 'Slop') qtyBase = Number(trx.qty) * selectedItemData.isiSlop;
                    const isMasuk = trx.type === 'IN'; const isKeluar = trx.type === 'OUT';
                    const row = { ...trx, masukBase: isMasuk ? qtyBase : 0, keluarBase: isKeluar ? qtyBase : 0, sisa: currentSisa };
                    if (isMasuk) currentSisa -= qtyBase; if (isKeluar) currentSisa += qtyBase;
                    return row;
                });
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (!liveData || !liveData.users) { setLoginError("Sistem belum siap, mohon tunggu sebentar..."); return; }
                const found = liveData?.users?.find(u => u.username.toLowerCase() === loginName.trim().toLowerCase() && u.password === loginPassword);
                if (found) {
                    localStorage.setItem('pos_user', found.username); localStorage.setItem('pos_role', found.role);
                    setCurrentUser(found.username); setUserRole(found.role); setIsLoggedIn(true); setActiveMenu(found.role === 'STAFF' ? 'opname' : 'dashboard');
                } else { setLoginError("ID atau PIN tidak terdaftar!"); }
            };

            const handleLogout = () => { localStorage.clear(); location.reload(); };

            const apiCall = async (payload) => {
                syncRef.current = true; setIsSyncing(true);
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if(result.status === 'success') { syncRef.current = false; fetchData(true); return true; }
                } catch(e) { console.error("API Call error:", e); setCustomAlert("Terjadi kesalahan koneksi saat menyimpan data. Coba lagi."); }
                syncRef.current = false; fetchData(true); return false;
            };

            const simpanScan = async (e) => {
                e.preventDefault();
                if(syncRef.current || !detectedItem) return;
                const payload = { action: 'scan', barcode: detectedItem.id, type: scanType === 'ADJUST' ? (adjustDir === 'MINUS' ? 'OUT' : 'IN') : scanType, qty: scanQty, uom: scanUom, user: currentUser, note: scanType === 'ADJUST' ? `ADJUST: ${scanNote}` : '' };
                setScanBarcode(''); setScanQty(1); setScanNote(''); setDetectedItem(null); setScanSuggestions([]);
                await apiCall(payload);
            };

            const simpanOpname = async (e) => {
                e.preventDefault();
                if(syncRef.current || !opnameItem) return;
                const payload = { action: 'opname', barcode: opnameItem.id, qty: opnameQty, uom: opnameUom, user: currentUser };
                setOpnameBarcode(''); setOpnameQty(''); setOpnameItem(null); setOpnameSuggestions([]);
                if(barcodeInputRef.current) barcodeInputRef.current.focus();
                await apiCall(payload);
            };

            const handleInlineOpnameChange = (id, value) => {
                setInlineOpnameQty(prev => ({ ...prev, [id]: value }));
            };

            const simpanInlineOpname = async (item) => {
                const qty = inlineOpnameQty[item.id];
                const uom = inlineOpnameUom[item.id] || 'Bal'; // Menggunakan BAL sebagai Default List
                if (qty === undefined || qty === '') return;
                if (syncRef.current) return;

                const payload = { action: 'opname', barcode: item.id, qty: qty, uom: uom, user: currentUser };
                
                // Optimistic UI
                setInlineOpnameQty(prev => ({ ...prev, [item.id]: '' }));
                await apiCall(payload);
                setCustomAlert(`Stok fisik ${item.name} berhasil disimpan!`);
            };

            const simpanMaster = async (e) => {
                e.preventDefault();
                if (syncRef.current) return;
                const success = await apiCall({ action: isEditMode ? 'edit_master' : 'add_master', ...newMaster });
                if(success) { setIsAddMasterOpen(false); setCustomAlert("Data Master Berhasil Disimpan!"); }
            };

            const hapusMaster = async () => {
                if (syncRef.current) return;
                const success = await apiCall({ action: 'delete_master', idBarang: deleteTarget });
                if(success) { setDeleteTarget(null); setCustomAlert("Produk telah dihapus."); }
            };

            const getStokInfo = (bks, iS, iB) => {
                if (bks === 0) return "Kosong";
                const bPerBal = iS * iB;
                const bal = Math.floor(bks / bPerBal);
                const sB = bks % bPerBal;
                const slop = Math.floor(sB / iS);
                const bungkus = sB % iS;
                let res = [];
                if (bal > 0) res.push(`${bal} Bal`);
                if (slop > 0) res.push(`${slop} Slop`);
                if (bungkus > 0) res.push(`${bungkus} Bks`);
                return res.join(" + ");
            };

            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center p-6 bg-slate-100 relative overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-30">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-indigo-400 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 right-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-100 z-10 fade-in text-center text-slate-800">
                            <div className="flex justify-center mb-10"><div className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-xl shadow-indigo-100"><Icon name="shield-check" size={40}/></div></div>
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">Grosir Pintar</h1>
                            <p className="text-slate-500 mb-10 text-[10px] font-bold tracking-[0.3em] uppercase">Enterprise Hub v2.5</p>
                            {isCheckingSystem ? <div className="py-10"><Icon name="refresh-cw" className="animate-spin text-indigo-500 mx-auto" size={32}/><p className="mt-4 font-bold text-slate-500 uppercase text-[10px]">Menyambungkan Database...</p></div> : (
                                <form onSubmit={handleLogin} className="space-y-6 text-left">
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">ID Login</label>
                                        <input required placeholder="Username" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginName} onChange={e=>setLoginName(e.target.value)} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">Sandi / PIN</label>
                                        <input required type="password" placeholder="Password" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                                    </div>
                                    {loginError && <p className="text-rose-600 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl">{loginError}</p>}
                                    <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest active:scale-95">Masuk Sistem</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            const menuList = [
                { id: 'dashboard', label: 'DASHBOARD', icon: 'layout-dashboard', role: 'ADMIN' },
                { id: 'gudang', label: 'MUTASI GUDANG', icon: 'scan-barcode', role: 'ADMIN' },
                { id: 'opname', label: 'STOK OPNAME', icon: 'clipboard-list', role: 'ALL' },
                { id: 'inventory', label: 'MASTER BARANG', icon: 'package', role: 'ADMIN' },
                { id: 'transactions', label: 'PUSAT LAPORAN', icon: 'file-spreadsheet', role: 'ADMIN' },
                { id: 'users', label: 'MANAJEMEN USER', icon: 'users', role: 'ADMIN' },
            ].filter(m => m.role === 'ALL' || userRole === 'ADMIN');

            return (
                <div className="flex h-screen overflow-hidden relative font-sans">
                    {/* SIDEBAR DENGAN FONT LEBIH TAJAM */}
                    {isMobileMenuOpen && <div className="absolute inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={()=>setIsMobileMenuOpen(false)}></div>}
                    <aside className={`absolute md:relative z-50 w-72 h-full bg-indigo-950 text-white flex flex-col shadow-2xl transition-transform duration-500 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shrink-0`}>
                        <div className="p-10 border-b border-white/5 flex flex-col items-center">
                            <Icon name="warehouse" size={48} className="text-indigo-400 mb-4" />
                            <h1 className="font-black text-2xl italic tracking-tighter text-white">GROSIR PINTAR</h1>
                            <p className="text-[10px] font-bold text-indigo-400/60 uppercase tracking-[0.4em] mt-1">Version 2.5</p>
                        </div>
                        <nav className="flex-1 p-6 space-y-2 overflow-y-auto no-scrollbar">
                            {menuList.map(m => (
                                <button key={m.id} onClick={()=>{setActiveMenu(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 p-4 md:p-5 rounded-[1.2rem] font-bold text-sm tracking-wider transition-all ${activeMenu === m.id ? 'bg-white text-indigo-900 shadow-xl scale-[1.03]' : 'text-indigo-200 hover:text-white hover:bg-white/10'}`}>
                                    <Icon name={m.icon} size={20} /> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 border-t border-white/5">
                            <div className="bg-white/10 p-5 rounded-[1.5rem] flex items-center justify-between hover:bg-white/20 transition-colors">
                                <div className="min-w-0 pr-2"><p className="text-xs font-black truncate">{currentUser.toUpperCase()}</p><p className="text-[10px] font-bold text-indigo-300 uppercase">{userRole === 'ADMIN' ? 'Owner' : 'Operator'}</p></div>
                                <button onClick={handleLogout} className="text-white/40 hover:text-rose-400 transition-colors p-2"><Icon name="log-out" size={20}/></button>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col bg-white overflow-hidden">
                        <header className="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-white z-10 shrink-0">
                            <div className="flex items-center gap-4 flex-1 w-full md:w-auto">
                                <button className="md:hidden text-slate-500 hover:text-indigo-600" onClick={()=>setIsMobileMenuOpen(true)}><Icon name="menu" size={28}/></button>
                                <div className="flex-1 md:flex-none md:max-w-md relative">
                                    <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={18}/></div>
                                    <input placeholder="Cari Master & Laporan..." className="w-full pl-12 pr-6 py-4 bg-slate-50 rounded-[1.5rem] border border-slate-200 outline-none focus:ring-2 ring-indigo-100 font-bold text-sm text-slate-700 transition-shadow" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className={`hidden md:flex items-center px-5 py-2.5 rounded-2xl text-xs font-black tracking-widest border ${isSyncing ? 'bg-indigo-50 border-indigo-200 text-indigo-700 animate-pulse' : 'bg-emerald-50 border-emerald-200 text-emerald-700'}`}>
                                <Icon name="database" size={16} className="mr-2"/> {isSyncing ? 'SINKRONISASI...' : 'SERVER ONLINE'}
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-auto bg-slate-50/50 p-4 md:p-10 no-scrollbar">
                            
                            {/* DASHBOARD VIEW */}
                            {activeMenu === 'dashboard' && userRole === 'ADMIN' && (
                                <div className="fade-in space-y-10">
                                    <h2 className="text-3xl font-black tracking-tighter italic uppercase text-slate-800">Ringkasan Gudang</h2>
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                        {liveData?.stats?.map((s,i) => (
                                            <div key={i} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 hover:border-indigo-300 transition-colors flex flex-col justify-between h-44">
                                                <p className="text-xs font-black text-slate-500 uppercase tracking-widest">{s.title}</p>
                                                <p className="text-3xl font-black text-slate-800 mt-2">{s.value}</p>
                                                <div className="mt-4"><span className="px-3 py-1.5 bg-indigo-50 text-indigo-700 text-[10px] font-black rounded-lg uppercase">{s.trend}</span></div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                        <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200 p-8 flex items-center justify-between">
                                            <div><h3 className="font-black text-slate-800 text-xl italic">Selamat Datang, {currentUser}!</h3><p className="text-slate-500 text-sm mt-2 font-medium">Status database terpantau aman dan sinkron.</p></div>
                                            <Icon name="check-circle-2" size={56} className="text-emerald-500 opacity-20"/>
                                        </div>
                                        <div className="bg-indigo-950 rounded-[3rem] shadow-2xl p-8 text-white flex flex-col justify-center">
                                            <h3 className="font-black text-indigo-300 uppercase text-sm tracking-widest mb-4 flex items-center gap-3"><Icon name="alert-circle" size={20}/> Stok Kritis</h3>
                                            <div className="space-y-4 max-h-40 overflow-y-auto no-scrollbar">
                                                {filteredLowStock.slice(0,3).map((item, idx) => (
                                                    <div key={idx} className="flex justify-between items-center text-sm border-b border-white/10 pb-3">
                                                        <span className="font-bold truncate pr-4 text-indigo-50">{item.name}</span>
                                                        <span className="font-black text-indigo-400 text-xs shrink-0 bg-white/10 px-3 py-1 rounded-lg">{item.sisa} Bks</span>
                                                    </div>
                                                ))}
                                                {filteredLowStock.length === 0 && <p className="text-white/40 italic text-sm font-medium">Semua stok terpantau cukup.</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MUTASI GUDANG VIEW */}
                            {activeMenu === 'gudang' && userRole === 'ADMIN' && (
                                <div className="fade-in max-w-2xl mx-auto space-y-8">
                                    <h2 className="text-3xl font-black text-slate-800 flex items-center gap-4 italic tracking-tighter uppercase"><Icon name="warehouse" className="text-indigo-600" size={32} /> Mutasi Harian</h2>
                                    <div className="bg-white p-8 md:p-10 rounded-[3rem] shadow-sm border border-slate-200 relative">
                                        <form onSubmit={simpanScan} className="space-y-10">
                                            <div className="grid grid-cols-3 gap-3 bg-slate-100 p-2 rounded-[2rem] border border-slate-200">
                                                {[ 
                                                    { id: 'IN', label: 'MASUK', color: 'bg-emerald-100 text-emerald-900 border-emerald-300' }, 
                                                    { id: 'OUT', label: 'KELUAR', color: 'bg-orange-100 text-orange-900 border-orange-300' }, 
                                                    { id: 'ADJUST', label: 'ADJUST', color: 'bg-indigo-100 text-indigo-900 border-indigo-300' } 
                                                ].map(opt => (
                                                    <button key={opt.id} type="button" onClick={() => setScanType(opt.id)} className={`py-4 rounded-[1.5rem] font-black text-xs tracking-widest transition-all border-2 ${scanType === opt.id ? `${opt.color} shadow-sm scale-105` : 'bg-transparent text-slate-500 border-transparent hover:bg-white'}`}>
                                                        {opt.label}
                                                    </button>
                                                ))}
                                            </div>
                                            <div className="space-y-4 text-slate-800">
                                                <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">DATA SCAN / KETIK NAMA</label>
                                                <div className="flex flex-col md:flex-row gap-4">
                                                    <div className="flex-1 relative">
                                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="barcode" size={20} /></div>
                                                        <input required autoFocus type="text" value={scanBarcode} onChange={(e)=>setScanBarcode(e.target.value)} placeholder="Ketik nama atau scan..." className="w-full pl-14 pr-14 py-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] focus:bg-white focus:border-indigo-400 font-bold outline-none transition-all text-sm" autoComplete="off" />
                                                        
                                                        <button type="button" onClick={() => { setScannerTarget('mutasi'); setIsScannerOpen(true); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-100 p-2.5 rounded-xl transition-all">
                                                            <Icon name="camera" size={20}/>
                                                        </button>
                                                        
                                                        {scanSuggestions.length > 0 && !detectedItem && (
                                                            <ul className="absolute z-50 w-full bg-white border border-slate-200 shadow-2xl rounded-2xl mt-2 max-h-60 overflow-y-auto no-scrollbar divide-y divide-slate-100">
                                                                {scanSuggestions.map(item => (
                                                                    <li key={item.id} onClick={() => setScanBarcode(item.name)} className="p-4 hover:bg-indigo-50 cursor-pointer transition-colors text-left">
                                                                        <p className="font-black text-slate-800 text-sm truncate">{item.name}</p>
                                                                        <p className="text-[10px] font-bold text-indigo-600 mt-1 uppercase tracking-widest">Sisa: {item.stok} Bks | Barcode: {item.bBungkus !== 'undefined' && item.bBungkus ? item.bBungkus : '-'}</p>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        )}
                                                    </div>
                                                    <div className="flex gap-2">
                                                        <input type="number" min="1" value={scanQty} onChange={(e)=>setScanQty(e.target.value)} className="w-24 px-3 py-5 bg-slate-50 border-2 border-slate-200 rounded-[1.5rem] focus:bg-white focus:border-indigo-400 text-center font-black text-2xl outline-none" />
                                                        <div className="w-32 relative">
                                                            <select value={scanUom} onChange={(e)=>setScanUom(e.target.value)} className="w-full h-full px-5 py-5 bg-white border-2 border-slate-200 rounded-[1.5rem] font-black text-xs text-slate-700 outline-none cursor-pointer uppercase tracking-widest appearance-none shadow-sm focus:border-indigo-500">
                                                                <option value="Bungkus">Bks</option><option value="Slop">Pak</option><option value="Bal">Bal</option>
                                                            </select>
                                                            <div className="absolute right-4 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none"><Icon name="chevron-right" size={18} /></div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            {scanType === 'ADJUST' && (
                                                <div className="bg-indigo-50 p-6 rounded-[2.5rem] border border-indigo-100 animate-in zoom-in-95">
                                                    <label className="text-xs font-black text-indigo-500 uppercase tracking-widest mb-4 block text-center italic">KONFIGURASI KOREKSI</label>
                                                    <div className="flex gap-4 mb-6">
                                                        <label className={`flex-1 flex flex-col items-center justify-center gap-2 p-5 rounded-2xl border-2 cursor-pointer transition-all ${adjustDir === 'MINUS' ? 'bg-rose-100 border-rose-300 text-rose-900 shadow-sm scale-105' : 'bg-white border-transparent text-slate-500 hover:bg-rose-50'}`}>
                                                            <input type="radio" name="adjDir" checked={adjustDir === 'MINUS'} onChange={() => setAdjustDir('MINUS')} className="hidden"/>
                                                            <Icon name="trending-down" size={24} /><span className="text-[10px] md:text-xs font-black uppercase">KURANGI (-)</span>
                                                        </label>
                                                        <label className={`flex-1 flex flex-col items-center justify-center gap-2 p-5 rounded-2xl border-2 cursor-pointer transition-all ${adjustDir === 'PLUS' ? 'bg-emerald-100 border-emerald-300 text-emerald-900 shadow-sm scale-105' : 'bg-white border-transparent text-slate-500 hover:bg-emerald-50'}`}>
                                                            <input type="radio" name="adjDir" checked={adjustDir === 'PLUS'} onChange={() => setAdjustDir('PLUS')} className="hidden"/>
                                                            <Icon name="trending-up" size={24} /><span className="text-[10px] md:text-xs font-black uppercase">TAMBAH (+)</span>
                                                        </label>
                                                    </div>
                                                    <input required type="text" value={scanNote} onChange={(e)=>setScanNote(e.target.value)} placeholder="Alasan Penyesuaian..." className="w-full px-6 py-5 bg-white border border-slate-200 rounded-2xl focus:border-indigo-400 text-sm font-bold italic outline-none text-slate-800" />
                                                </div>
                                            )}
                                            <div className="min-h-[90px]">
                                                {detectedItem ? (
                                                    <div className="p-6 bg-indigo-600 rounded-[2rem] text-white shadow-xl flex items-center gap-5 animate-in slide-in-from-top-4">
                                                        <div className="bg-white/20 p-3 rounded-2xl shrink-0"><Icon name="check-circle-2" size={32} /></div>
                                                        <div className="overflow-hidden">
                                                            <p className="text-[10px] font-bold uppercase opacity-80 tracking-widest mb-1">Terdeteksi:</p>
                                                            <p className="text-xl font-black tracking-tight truncate">{detectedItem.name}</p>
                                                        </div>
                                                    </div>
                                                ) : scanBarcode.length > 0 && scanSuggestions.length === 0 ? (
                                                    <div className="p-6 bg-rose-50 border border-rose-200 rounded-[2rem] flex items-center gap-4">
                                                        <Icon name="server-crash" size={28} className="text-rose-600" />
                                                        <p className="text-xs font-black text-rose-800 uppercase tracking-widest">Produk tidak dikenal!</p>
                                                    </div>
                                                ) : null}
                                            </div>
                                            <button type="submit" disabled={!detectedItem || isSyncing} className="w-full bg-slate-900 text-white font-black py-6 rounded-[2rem] shadow-2xl hover:bg-black transition-all disabled:opacity-30 text-sm uppercase tracking-widest">SIMPAN MUTASI</button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {/* OPNAME VIEW (WITH SORTING, PAGINATION, AND INLINE EDITING) */}
                            {activeMenu === 'opname' && (
                                <div className="fade-in flex flex-col lg:flex-row gap-8">
                                    <div className="w-full lg:w-1/3 space-y-6">
                                        <h2 className="text-2xl font-black italic uppercase text-slate-800">Cari & Set Opname</h2>
                                        <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-200 text-slate-800 sticky top-6">
                                            <form onSubmit={simpanOpname} className="space-y-8 text-center">
                                                <div className="text-left space-y-2 relative">
                                                    <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">1. Pilih atau Scan Produk</label>
                                                    <div className="relative">
                                                        <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={20} /></div>
                                                        <input ref={barcodeInputRef} required autoFocus className="w-full pl-14 pr-14 py-5 bg-slate-50 border-2 border-slate-200 rounded-[1.8rem] focus:bg-white focus:border-indigo-400 font-bold outline-none shadow-inner text-sm transition-all" placeholder="Ketik/Scan..." value={opnameBarcode} onChange={e=>setOpnameBarcode(e.target.value)} autoComplete="off" />
                                                        <button type="button" onClick={() => { setScannerTarget('opname'); setIsScannerOpen(true); }} className="absolute right-3 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-100 p-2.5 rounded-xl transition-all">
                                                            <Icon name="camera" size={20}/>
                                                        </button>
                                                    </div>
                                                    {opnameSuggestions.length > 0 && !opnameItem && (
                                                        <ul className="absolute z-50 w-full bg-white border border-slate-200 shadow-2xl rounded-2xl mt-2 max-h-60 overflow-y-auto no-scrollbar divide-y divide-slate-100">
                                                            {opnameSuggestions.map(item => (
                                                                <li key={item.id} onClick={() => setOpnameBarcode(item.name)} className="p-4 hover:bg-indigo-50 cursor-pointer transition-colors text-left">
                                                                    <p className="font-black text-slate-800 text-sm truncate">{item.name}</p>
                                                                    <p className="text-[10px] font-bold text-indigo-600 mt-1 uppercase tracking-widest">Sistem: {item.stok} Bks | Barcode: {item.bBungkus !== 'undefined' && item.bBungkus ? item.bBungkus : '-'}</p>
                                                                </li>
                                                            ))}
                                                        </ul>
                                                    )}
                                                </div>
                                                {opnameItem && (
                                                    <div className="bg-slate-900 p-6 rounded-[2.5rem] text-white space-y-6 animate-in zoom-in-95 text-left shadow-xl">
                                                        <div className="border-b border-white/20 pb-5 flex justify-between items-start">
                                                            <div className="min-w-0 pr-2"><p className="text-[10px] font-black opacity-60 uppercase tracking-widest mb-1">Produk Terpilih:</p><p className="text-base font-black truncate">{opnameItem.name}</p></div>
                                                            {userRole === 'ADMIN' && <div className="text-right shrink-0"><p className="text-[10px] font-black opacity-60 uppercase tracking-widest mb-1">Sistem:</p><p className="font-black text-indigo-300 text-xl">{opnameItem.stok} Bks</p></div>}
                                                        </div>
                                                        <div className="space-y-3">
                                                            <p className="text-[10px] font-black opacity-60 uppercase tracking-widest">2. Input Jumlah Fisik Rak:</p>
                                                            <div className="flex gap-3">
                                                                <input required type="number" min="0" className="w-24 bg-white/10 border border-white/20 p-5 rounded-2xl font-black text-3xl text-center text-white outline-none focus:border-indigo-400 transition-colors" value={opnameQty} onChange={e=>setOpnameQty(e.target.value)} />
                                                                <div className="flex-1 relative">
                                                                    <select value={opnameUom} onChange={e=>setOpnameUom(e.target.value)} className="w-full h-full bg-white border-2 border-transparent p-4 rounded-2xl font-black text-sm text-slate-800 outline-none cursor-pointer appearance-none">
                                                                        <option value="Bungkus">BUNGKUS</option><option value="Slop">PAK/SLOP</option><option value="Bal">BAL</option>
                                                                    </select>
                                                                    <Icon name="chevron-right" className="absolute right-4 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none" size={18}/>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}
                                                <button disabled={!opnameItem || opnameQty === '' || isSyncing} className="w-full bg-indigo-600 text-white font-black py-6 rounded-[2rem] shadow-xl uppercase tracking-widest disabled:opacity-30 active:scale-95 transition-all text-sm hover:bg-indigo-700">Simpan Fisik</button>
                                            </form>
                                        </div>
                                    </div>
                                    <div className="flex-1 space-y-6">
                                        <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                                            <div className="flex justify-between mb-4"><p className="font-black text-xs uppercase tracking-widest text-slate-500">Penyelesaian Audit Hari Ini</p><p className="font-black text-indigo-600 text-lg">{Math.round((liveData?.masterItems.filter(i=>i.opnamedToday).length / liveData?.masterItems.length) * 100 || 0)}%</p></div>
                                            <div className="w-full h-4 bg-slate-100 rounded-full overflow-hidden"><div className="h-full bg-indigo-600 transition-all duration-1000 shadow-sm" style={{width: `${Math.round((liveData?.masterItems.filter(i=>i.opnamedToday).length / liveData?.masterItems.length) * 100 || 0)}%`}}></div></div>
                                        </div>
                                        <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-[500px]">
                                            <div className="p-8 bg-slate-50/80 border-b border-slate-200 flex justify-between items-center">
                                                <span className="font-black text-xs uppercase tracking-widest text-slate-600">Daftar Opname & Revisi Fisik</span>
                                                <span className="text-[10px] font-bold text-slate-400 italic">Isi langsung di tabel</span>
                                            </div>
                                            <div className="overflow-x-auto flex-1">
                                                <table className="w-full text-left min-w-[700px]">
                                                    <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-500 border-b border-slate-200">
                                                        <tr>
                                                            <th className="p-6 cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => handleSortOpname('name')}>
                                                                PRODUK {sortConfigOpname.key === 'name' ? (sortConfigOpname.direction === 'asc' ? '↑' : '↓') : ''}
                                                            </th>
                                                            {userRole==='ADMIN' && 
                                                            <th className="p-6 text-right cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => handleSortOpname('stok')}>
                                                                SISTEM {sortConfigOpname.key === 'stok' ? (sortConfigOpname.direction === 'asc' ? '↑' : '↓') : ''}
                                                            </th>}
                                                            <th className="p-6 text-center cursor-pointer hover:bg-slate-200 transition-colors" onClick={() => handleSortOpname('status')}>
                                                                STATUS {sortConfigOpname.key === 'status' ? (sortConfigOpname.direction === 'asc' ? '↑' : '↓') : ''}
                                                            </th>
                                                            <th className="p-6 text-right min-w-[200px]">INPUT FISIK (BAL/PAK/BKS)</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 text-sm font-medium">
                                                        {currentOpnameItems.map((item) => (
                                                            <tr key={item.id} className={`transition-colors ${!item.opnamedToday ? 'opacity-80 hover:bg-slate-50' : 'bg-emerald-50/30 hover:bg-emerald-50'}`}>
                                                                <td className="p-6 cursor-pointer" onClick={() => { setOpnameBarcode(item.name); if(barcodeInputRef.current) barcodeInputRef.current.focus(); window.scrollTo({ top: 0, behavior: 'smooth' }); }}>
                                                                    <p className="font-bold text-slate-800">{item.name}</p>
                                                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">{item.id}</p>
                                                                </td>
                                                                {userRole==='ADMIN' && <td className="p-6 text-right font-mono text-slate-500">{item.stok}</td>}
                                                                <td className="p-6 text-center">
                                                                    {item.opnamedToday ? <Icon name="check-circle-2" className="text-emerald-500 mx-auto" size={24}/> : <span className="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Belum Cek</span>}
                                                                    {userRole==='ADMIN' && item.opnamedToday && item.selisihOpname !== 0 && (
                                                                        <div className={`mt-2 text-[10px] font-black tracking-widest ${item.selisihOpname > 0 ? 'text-emerald-600' : 'text-rose-600'}`}>
                                                                            Selisih: {item.selisihOpname > 0 ? '+' : ''}{item.selisihOpname}
                                                                        </div>
                                                                    )}
                                                                </td>
                                                                <td className="p-6">
                                                                    <div className="flex items-center justify-end gap-2">
                                                                        <input 
                                                                            type="number" 
                                                                            min="0"
                                                                            placeholder={item.opnamedToday ? "Ubah" : "Qty"}
                                                                            className="w-20 px-3 py-3 bg-white border-2 border-slate-200 rounded-xl text-center font-black text-sm outline-none focus:border-indigo-400 transition-all"
                                                                            value={inlineOpnameQty[item.id] !== undefined ? inlineOpnameQty[item.id] : ''}
                                                                            onChange={(e) => handleInlineOpnameChange(item.id, e.target.value)}
                                                                        />
                                                                        <select 
                                                                            value={inlineOpnameUom[item.id] || 'Bal'} 
                                                                            onChange={(e) => setInlineOpnameUom(prev => ({...prev, [item.id]: e.target.value}))}
                                                                            className="w-20 bg-white border-2 border-slate-200 p-3 rounded-xl font-black text-xs text-slate-700 outline-none cursor-pointer appearance-none text-center"
                                                                        >
                                                                            <option value="Bungkus">Bks</option>
                                                                            <option value="Slop">Pak</option>
                                                                            <option value="Bal">Bal</option>
                                                                        </select>
                                                                        <button 
                                                                            onClick={() => simpanInlineOpname(item)}
                                                                            disabled={inlineOpnameQty[item.id] === undefined || inlineOpnameQty[item.id] === '' || isSyncing}
                                                                            className="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 disabled:opacity-30 transition-all shadow-sm hover:shadow-md"
                                                                        >
                                                                            <Icon name="save" size={16} />
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {currentOpnameItems.length === 0 && <tr><td colSpan={userRole==='ADMIN'?4:3} className="p-10 text-center text-slate-400 font-bold">Produk tidak ditemukan.</td></tr>}
                                                    </tbody>
                                                </table>
                                            </div>
                                            {/* Paginasi Table Opname */}
                                            {totalPagesOpname > 1 && (
                                                <div className="flex justify-between items-center p-6 bg-slate-50 border-t border-slate-200 shrink-0">
                                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Halaman {currentPageOpname} dari {totalPagesOpname}</span>
                                                    <div className="flex gap-2">
                                                        <button disabled={currentPageOpname === 1} onClick={() => setCurrentPageOpname(prev => prev - 1)} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold hover:bg-slate-100 disabled:opacity-30">Prev</button>
                                                        <button disabled={currentPageOpname === totalPagesOpname} onClick={() => setCurrentPageOpname(prev => prev + 1)} className="px-4 py-2 bg-white border border-slate-200 rounded-lg text-xs font-bold hover:bg-slate-100 disabled:opacity-30">Next</button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MASTER BARANG VIEW */}
                            {activeMenu === 'inventory' && userRole === 'ADMIN' && (
                                <div className="fade-in space-y-8">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                        <h2 className="text-3xl font-black italic uppercase tracking-tighter text-slate-800">Database Produk</h2>
                                        <div className="flex flex-wrap gap-3 w-full md:w-auto">

                                                    <select value={filterType} onChange={(e)=>setFilterType(e.target.value)} className="bg-transparent font-bold text-sm text-slate-700 outline-none w-full appearance-none cursor-pointer uppercase tracking-wider">

                                                        <option value="IN">Hanya Barang Masuk</option>
                                                        <option value="OUT">Hanya Barang Keluar</option>
                                                        <option value="ADJUST">Hanya Log Penyesuaian / Koreksi</option>

                                                    <option value="">-- Sentuh untuk Memilih Produk --</option>
                                                    {liveData?.masterItems.map(i => <option key={i.id} value={i.id}>{i.name} (Sisa Aktual: {i.stok} Bks)</option>)}

                                                <Icon name="chevron-right" className="absolute right-6 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none" size={24}/>

                                                     activeReportTab === 'rekap_selisih' ? <tr className="bg-rose-50 text-rose-800 border-rose-200"><th className="p-8">PRODUK</th><th className="p-8 text-center">STATUS</th><th className="p-8 text-right">SISTEM</th><th className="p-8 text-right">FISIK</th><th className="p-8 text-right">SELISIH</th></tr> :
                                                     <tr className="bg-emerald-50 text-emerald-800 border-emerald-200"><th className="p-8">TANGGAL & WAKTU</th><th className="p-8 text-right text-emerald-700">MASUK</th><th className="p-8 text-right text-orange-600">KELUAR</th><th className="p-8 text-right text-slate-900 font-black">SALDO</th><th className="p-8">KETERANGAN</th></tr>}

                                                <tbody className="divide-y divide-slate-100 text-sm font-medium">

                                                        <tr key={i} className={!item.opnamedToday ? 'opacity-40' : 'hover:bg-slate-50'}><td className="p-8 font-bold text-slate-800">{item.name}<br/><span className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">{item.id}</span></td><td className="p-8 text-center"><span className={`px-4 py-2 rounded-xl text-[9px] font-black tracking-widest ${item.opnamedToday?'bg-emerald-100 text-emerald-800':'bg-slate-100 text-slate-500'}`}>{item.opnamedToday?'SELESAI':'BELUM'}</span></td><td className="p-8 text-right font-mono text-sm text-slate-500">{item.opnamedToday?item.stok-item.selisihOpname:item.stok}</td><td className="p-8 text-right font-black text-slate-900 text-lg">{item.opnamedToday?item.stok:'-'}</td><td className="p-8 text-right font-black text-lg">{item.opnamedToday ? (item.selisihOpname===0?<span className="text-slate-400">SESUAI</span>:<span className={item.selisihOpname>0?'text-emerald-500':'text-rose-600'}>{item.selisihOpname>0?'+':''}{item.selisihOpname}</span>) : '-'}</td></tr>

                                                    {activeReportTab === 'kartu' && kartuStokItem && getKartuStokData().map((t,i)=>(

                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* USER MANAGEMENT VIEW */}
                            {activeMenu === 'users' && userRole === 'ADMIN' && (
                                <div className="fade-in space-y-8">
                                    <div className="flex justify-between items-center text-slate-800">
                                        <h2 className="text-3xl font-black italic uppercase tracking-tighter">Kelola Akses</h2>
                                        <button onClick={()=>{setIsEditUserMode(false); setIsUserModalOpen(true);}} className="bg-indigo-600 text-white px-8 py-5 rounded-[2rem] font-black text-xs tracking-widest uppercase flex items-center gap-3 shadow-xl hover:bg-indigo-700 transition-all"><Icon name="user-plus" size={18}/> Tambah Pegawai</button>
                                    </div>
                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-200 overflow-hidden text-slate-800">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-500 border-b border-slate-200">
                                                <tr><th className="p-8">USERNAME</th><th className="p-8 text-center">ROLE</th><th className="p-8 text-center">AKSI</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-bold">
                                                {liveData?.users?.map((u,i)=>(
                                                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-8 flex items-center gap-5"><div className={`w-12 h-12 rounded-full flex items-center justify-center text-white font-black text-lg ${u.role==='ADMIN'?'bg-indigo-500':'bg-slate-400'}`}>{u.username[0].toUpperCase()}</div>{u.username}</td>

                                                        <td className="p-8 text-center space-x-3">
                                                            <button onClick={()=>{setNewUser({ oldUsername: u.username, username: u.username, password: u.password, role: u.role }); setIsEditUserMode(true); setIsUserModalOpen(true);}} className="p-4 bg-slate-100 text-slate-500 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Icon name="edit" size={18}/></button>
                                                            {u.username !== 'admin' && <button onClick={()=>setDeleteUserTarget(u.username)} className="p-4 bg-slate-100 text-slate-500 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-sm"><Icon name="trash-2" size={18}/></button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>

                        </div>

                                <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">

                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">SKU ID</label><input value={newMaster.idBarang} onChange={e=>setNewMaster({...newMaster, idBarang: e.target.value})} disabled={isEditMode} className="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:bg-white focus:border-indigo-400 rounded-2xl font-bold transition-all outline-none text-sm" /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Nama Barang</label><input value={newMaster.namaBarang} onChange={e=>setNewMaster({...newMaster, namaBarang: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-slate-200 focus:bg-white focus:border-indigo-400 rounded-2xl font-bold transition-all outline-none text-sm" /></div>
                                    </div>
                                    <div className="bg-slate-50 p-6 md:p-8 rounded-[2rem] border border-slate-200 space-y-4">
                                        <p className="text-[10px] font-black text-slate-600 uppercase tracking-widest text-center mb-4 italic flex items-center justify-center gap-2"><Icon name="barcode" size={16}/> Registrasi Barcode</p>
                                        
                                        <div className="relative">
                                            <input value={newMaster.barcodeBungkus} onChange={e=>setNewMaster({...newMaster, barcodeBungkus: e.target.value})} placeholder="Barcode Bungkus" className="w-full pl-5 pr-14 py-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_bungkus'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-2 rounded-lg transition-all"><Icon name="camera" size={18}/></button>
                                        </div>

                                        <div className="relative">
                                            <input value={newMaster.barcodeSlop} onChange={e=>setNewMaster({...newMaster, barcodeSlop: e.target.value})} placeholder="Barcode Slop" className="w-full pl-5 pr-14 py-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_slop'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-2 rounded-lg transition-all"><Icon name="camera" size={18}/></button>
                                        </div>

                                        <div className="relative">
                                            <input value={newMaster.barcodeBal} onChange={e=>setNewMaster({...newMaster, barcodeBal: e.target.value})} placeholder="Barcode Bal" className="w-full pl-5 pr-14 py-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_bal'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-2 rounded-lg transition-all"><Icon name="camera" size={18}/></button>

                                        <div className="space-y-2 text-center"><label className="text-[10px] font-black text-slate-500 uppercase tracking-widest">1 Bal = .. Slp</label><input type="number" value={newMaster.isiBal} onChange={e=>setNewMaster({...newMaster, isiBal: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-slate-200 rounded-2xl text-center font-black text-xl outline-none focus:border-indigo-400" /></div>

                                </div>

                            </div>
                        </div>
