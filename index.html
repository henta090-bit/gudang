<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grosir Pintar POS v2.5</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML5 QRCode Scanner untuk Kamera HP/iPad -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Style adjustments for HTML5 QR Code Scanner */
        #reader button { padding: 10px 20px; background-color: #4f46e5; color: white; border-radius: 12px; font-weight: 800; margin: 4px; cursor: pointer; border: none; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;}
        #reader select { padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 10px; width: 100%; font-weight: bold; outline: none;}
        #reader a { display: none !important; }
        #reader { border: none !important; }
        #reader video { border-radius: 16px; object-fit: cover; }
        
        /* Text clarity improvements */
        .text-sharp { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden text-sharp">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            // --- KONFIGURASI URL API ---
            // PASTIKAN URL INI BENAR (HTTPS)
            const API_URL = "https://script.google.com/macros/s/AKfycbwolB1qiZh8mTgngPufaSiYHfu8LcDYBf_kQjueOxAme-ADXZq8WGS6xEYiB0ilfMSQ/exec";

            const [currentUser, setCurrentUser] = useState(localStorage.getItem('pos_user') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('pos_role') || 'ADMIN');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pos_user'));
            const [loginName, setLoginName] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('pos_role') === 'STAFF' ? 'opname' : 'dashboard');
            const [liveData, setLiveData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(true);
            const [isCheckingSystem, setIsCheckingSystem] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            const syncRef = useRef(false);

            // STATE FORM & MODAL
            const [scanBarcode, setScanBarcode] = useState('');
            const [scanType, setScanType] = useState('IN');
            const [adjustDir, setAdjustDir] = useState('MINUS');
            const [scanQty, setScanQty] = useState(1);
            const [scanUom, setScanUom] = useState('Bungkus');
            const [scanNote, setScanNote] = useState('');
            
            const [opnameBarcode, setOpnameBarcode] = useState('');
            const [opnameQty, setOpnameQty] = useState('');
            const [opnameUom, setOpnameUom] = useState('Bal'); // Default Bal
            
            const [detectedItem, setDetectedItem] = useState(null);
            const [scanSuggestions, setScanSuggestions] = useState([]);
            
            const [opnameItem, setOpnameItem] = useState(null);
            const [opnameSuggestions, setOpnameSuggestions] = useState([]);

            // State Input Inline Tabel Opname
            const [inlineOpnameQty, setInlineOpnameQty] = useState({});
            const [inlineOpnameUom, setInlineOpnameUom] = useState({});

            // Fitur Sortir & Paginasi
            const [sortConfigOpname, setSortConfigOpname] = useState({ key: 'name', direction: 'asc' });
            const [currentPageOpname, setCurrentPageOpname] = useState(1);
            const itemsPerPageOpname = 50; 

            const [filterDate, setFilterDate] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [activeReportTab, setActiveReportTab] = useState('mutasi');
            const [kartuStokItem, setKartuStokItem] = useState('');

            const [customAlert, setCustomAlert] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [deleteUserTarget, setDeleteUserTarget] = useState(null);
            const [isAddMasterOpen, setIsAddMasterOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [newMaster, setNewMaster] = useState({ idBarang: '', namaBarang: '', barcodeBungkus: '', barcodeSlop: '', barcodeBal: '', isiSlop: 12, isiBal: 10, stokAwal: 0 });
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [isEditUserMode, setIsEditUserMode] = useState(false);
            const [newUser, setNewUser] = useState({ oldUsername: '', username: '', password: '', role: 'STAFF' });

            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState(null); 
            const scannerRef = useRef(null);

            const barcodeInputRef = useRef(null);

            // --- DATA FETCHING (DIPERKUAT) ---
            const fetchData = async (silent = false) => {
                if (!API_URL || !API_URL.startsWith("http")) { 
                    setIsSyncing(false); 
                    setIsCheckingSystem(false);
                    return; 
                }
                if (syncRef.current && silent) return; 
                
                syncRef.current = true;
                if (!silent) setIsLoading(true);
                setIsSyncing(true);
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const res = await fetch(API_URL, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!res.ok) throw new Error("Server response not ok");
                    const data = await res.json();
                    setLiveData(data);
                    setLoginError('');
                } catch (e) { 
                    console.error("Auto-sync error:", e); 
                    if (!silent) setLoginError("Koneksi gagal. Cek URL API atau internet.");
                }
                finally { 
                    setIsLoading(false); 
                    setIsSyncing(false); 
                    setIsCheckingSystem(false); 
                    syncRef.current = false;
                }
            };

            useEffect(() => { 
                fetchData(); 
                const interval = setInterval(() => { fetchData(true); }, 30000); 
                return () => clearInterval(interval);
            }, []);

            // --- SCANNER LOGIC ---
            useEffect(() => {
                if (isScannerOpen) {
                    const formats = window.Html5QrcodeSupportedFormats ? [
                        window.Html5QrcodeSupportedFormats.EAN_13, window.Html5QrcodeSupportedFormats.EAN_8,
                        window.Html5QrcodeSupportedFormats.UPC_A, window.Html5QrcodeSupportedFormats.UPC_E,
                        window.Html5QrcodeSupportedFormats.CODE_128, window.Html5QrcodeSupportedFormats.CODE_39,
                        window.Html5QrcodeSupportedFormats.QR_CODE
                    ] : undefined;

                    const html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0, formatsToSupport: formats }, false
                    );
                    scannerRef.current = html5QrcodeScanner;
                    
                    html5QrcodeScanner.render((decodedText) => {
                        if (scannerTarget === 'mutasi') setScanBarcode(decodedText);
                        else if (scannerTarget === 'opname') setOpnameBarcode(decodedText);
                        else if (scannerTarget === 'master_bungkus') setNewMaster(prev => ({ ...prev, barcodeBungkus: decodedText }));
                        else if (scannerTarget === 'master_slop') setNewMaster(prev => ({ ...prev, barcodeSlop: decodedText }));
                        else if (scannerTarget === 'master_bal') setNewMaster(prev => ({ ...prev, barcodeBal: decodedText }));
                        
                        try { navigator.vibrate && navigator.vibrate(200); } catch(e){}
                        html5QrcodeScanner.clear(); setIsScannerOpen(false);
                    }, (error) => {});
                }
                return () => { if (scannerRef.current) scannerRef.current.clear().catch(e => {}); };
            }, [isScannerOpen, scannerTarget]);

            const findItemExact = (inputStr) => {
                const clean = String(inputStr).trim().toLowerCase();
                if (!clean || !liveData?.masterItems) return null;
                for (let item of liveData.masterItems) {
                    if (String(item.bBungkus).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                    if (String(item.bSlop).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Slop' };
                    if (String(item.bBal).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.name).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.id).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                }
                return null;
            };

            useEffect(() => {
                const found = findItemExact(scanBarcode);
                setDetectedItem(found);
                if(found) { setScanUom(found.defaultUom); setScanSuggestions([]); } 
                else {
                    const lowerInput = scanBarcode.toLowerCase().trim();
                    if(lowerInput.length > 1) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput)
                        ).slice(0, 5) || [];
                        setScanSuggestions(suggestions);
                    } else { setScanSuggestions([]); }
                }
            }, [scanBarcode, liveData]);

            useEffect(() => {
                const found = findItemExact(opnameBarcode);
                setOpnameItem(found);
                if(found) { setOpnameUom(found.defaultUom); setOpnameSuggestions([]); } 
                else {
                    const lowerInput = opnameBarcode.toLowerCase().trim();
                    if(lowerInput.length > 1) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput)
                        ).slice(0, 5) || [];
                        setOpnameSuggestions(suggestions);
                    } else { setOpnameSuggestions([]); }
                }
            }, [opnameBarcode, liveData]);

            // --- OPTIMASI TABEL OPNAME (RIBUAN DATA) ---
            const processedOpnameData = useMemo(() => {
                let items = (liveData?.masterItems || []).filter(i => 
                    i.name.toLowerCase().includes(searchTerm.toLowerCase()) || i.id.toLowerCase().includes(searchTerm.toLowerCase())
                );
                
                if (sortConfigOpname.key) {
                    items.sort((a, b) => {
                        let aVal = a[sortConfigOpname.key];
                        let bVal = b[sortConfigOpname.key];
                        
                        if (sortConfigOpname.key === 'status') {
                            aVal = a.opnamedToday ? 1 : 0;
                            bVal = b.opnamedToday ? 1 : 0;
                        }
                        
                        if (typeof aVal === 'string') {
                            return sortConfigOpname.direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                        }
                        return sortConfigOpname.direction === 'asc' ? aVal - bVal : bVal - aVal;
                    });
                }
                return items;
            }, [liveData, searchTerm, sortConfigOpname]);

            const totalPagesOpname = Math.ceil(processedOpnameData.length / itemsPerPageOpname) || 1;
            const currentOpnameItems = processedOpnameData.slice((currentPageOpname - 1) * itemsPerPageOpname, currentPageOpname * itemsPerPageOpname);

            const handleSortOpname = (key) => {
                let direction = 'asc';
                if (sortConfigOpname.key === key && sortConfigOpname.direction === 'asc') direction = 'desc';
                setSortConfigOpname({ key, direction });
            };

            const filteredMasterItems = (liveData?.masterItems || []).filter(i => 
                i.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                i.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                String(i.bBungkus).includes(searchTerm)
            );

            const filteredTransactions = (liveData?.transactions || []).filter(t => {
                const mSearch = t.item.toLowerCase().includes(searchTerm.toLowerCase()) || t.user.toLowerCase().includes(searchTerm.toLowerCase());
                const mDate = filterDate ? t.date === filterDate : true;
                let mType = true;
                if (filterType === 'IN') mType = t.type === 'IN' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'OUT') mType = t.type === 'OUT' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'ADJUST') mType = t.id.startsWith('OPN-') || t.note.includes('ADJUST');
                return mSearch && mDate && mType;
            });

            const filteredLowStock = (liveData?.lowStock || []).filter(item => item.name.toLowerCase().includes(searchTerm.toLowerCase()));

            // --- API HANDLERS ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (!liveData || !liveData.users) { setLoginError("Menghubungkan ke server..."); fetchData(); return; }
                const found = liveData?.users?.find(u => u.username.toLowerCase() === loginName.trim().toLowerCase() && u.password === loginPassword);
                if (found) {
                    localStorage.setItem('pos_user', found.username); localStorage.setItem('pos_role', found.role);
                    setCurrentUser(found.username); setUserRole(found.role); setIsLoggedIn(true); setActiveMenu(found.role === 'STAFF' ? 'opname' : 'dashboard');
                } else { setLoginError("ID atau PIN tidak terdaftar!"); }
            };

            const handleLogout = () => { localStorage.clear(); location.reload(); };

            const apiCall = async (payload) => {
                syncRef.current = true; setIsSyncing(true);
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if(result.status === 'success') { syncRef.current = false; fetchData(true); return true; }
                } catch(e) { console.error("API Call error:", e); setCustomAlert("Gagal mengirim data. Cek koneksi Anda."); }
                syncRef.current = false; fetchData(true); return false;
            };

            const simpanScan = async (e) => {
                e.preventDefault();
                if(syncRef.current || !detectedItem) return;
                const payload = { action: 'scan', barcode: detectedItem.id, type: scanType === 'ADJUST' ? (adjustDir === 'MINUS' ? 'OUT' : 'IN') : scanType, qty: scanQty, uom: scanUom, user: currentUser, note: scanType === 'ADJUST' ? `ADJUST: ${scanNote}` : '' };
                setScanBarcode(''); setScanQty(1); setScanNote(''); setDetectedItem(null); setScanSuggestions([]);
                await apiCall(payload);
            };

            const simpanOpname = async (e) => {
                e.preventDefault();
                if(syncRef.current || !opnameItem) return;
                const payload = { action: 'opname', barcode: opnameItem.id, qty: opnameQty, uom: opnameUom, user: currentUser };
                setOpnameBarcode(''); setOpnameQty(''); setOpnameItem(null); setOpnameSuggestions([]);
                if(barcodeInputRef.current) barcodeInputRef.current.focus();
                await apiCall(payload);
            };

            const handleInlineOpnameChange = (id, value) => {
                setInlineOpnameQty(prev => ({ ...prev, [id]: value }));
            };

            const simpanInlineOpname = async (item) => {
                const qty = inlineOpnameQty[item.id];
                const uom = inlineOpnameUom[item.id] || 'Bal'; 
                if (qty === undefined || qty === '') return;
                if (syncRef.current) return;
                const payload = { action: 'opname', barcode: item.id, qty: qty, uom: uom, user: currentUser };
                setInlineOpnameQty(prev => ({ ...prev, [item.id]: '' }));
                await apiCall(payload);
                setCustomAlert(`Opname ${item.name} berhasil disimpan!`);
            };

            const simpanMaster = async (e) => {
                e.preventDefault();
                if (syncRef.current) return;
                const success = await apiCall({ action: isEditMode ? 'edit_master' : 'add_master', ...newMaster });
                if(success) { setIsAddMasterOpen(false); setCustomAlert("Master Produk disimpan!"); }
            };

            const hapusMaster = async () => {
                if (syncRef.current) return;
                const success = await apiCall({ action: 'delete_master', idBarang: deleteTarget });
                if(success) { setDeleteTarget(null); setCustomAlert("Produk dihapus."); }
            };

            // UI HELPERS
            const handleExportCSV = (type) => {
                let csvRows = [];
                let filename = `Laporan_${new Date().toLocaleDateString()}.csv`;
                if (type === 'mutasi') {
                    csvRows = [["Tanggal", "Waktu", "Tipe", "Produk", "Jumlah", "Satuan", "Operator", "Catatan"].join(","), ...filteredTransactions.map(t => `"${t.date}","${t.time}","${t.type}","${t.item}","${t.qty}","${t.uom}","${t.user}","${t.note}"`)];
                } else if (type === 'rekap_selisih') {
                    csvRows = [["Produk", "Sistem", "Fisik", "Selisih"].join(","), ...(liveData?.masterItems || []).map(i => `"${i.name}","${i.stok - i.selisihOpname}","${i.stok}","${i.selisihOpname}"`)];
                }
                const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
                const a = document.createElement("a"); a.href = window.URL.createObjectURL(blob); a.download = filename; a.click();
            };

            const getStokInfo = (bks, iS, iB) => {
                if (bks === 0) return "Kosong";
                const bPerBal = iS * iB;
                const bal = Math.floor(bks / bPerBal);
                const sB = bks % bPerBal;
                const slop = Math.floor(sB / iS);
                const bungkus = sB % iS;
                let res = [];
                if (bal > 0) res.push(`${bal} Bal`);
                if (slop > 0) res.push(`${slop} Slop`);
                if (bungkus > 0) res.push(`${bungkus} Bks`);
                return res.join(" + ");
            };

            const menuList = [
                { id: 'dashboard', label: 'DASHBOARD', icon: 'layout-dashboard', role: 'ADMIN' },
                { id: 'gudang', label: 'MUTASI GUDANG', icon: 'scan-barcode', role: 'ADMIN' },
                { id: 'opname', label: 'STOK OPNAME', icon: 'clipboard-list', role: 'ALL' },
                { id: 'inventory', label: 'MASTER BARANG', icon: 'package', role: 'ADMIN' },
                { id: 'transactions', label: 'PUSAT LAPORAN', icon: 'file-spreadsheet', role: 'ADMIN' },
                { id: 'users', label: 'MANAJEMEN USER', icon: 'users', role: 'ADMIN' },
            ].filter(m => m.role === 'ALL' || userRole === 'ADMIN');

            // --- UI RENDER ---
            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center p-6 bg-slate-100 relative overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-30">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-indigo-400 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 right-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-100 z-10 fade-in text-center text-slate-800">
                            <div className="flex justify-center mb-10"><div className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-xl shadow-indigo-100"><Icon name="shield-check" size={40}/></div></div>
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">Grosir Pintar</h1>
                            <p className="text-slate-500 mb-10 text-[10px] font-bold tracking-[0.3em] uppercase">Enterprise Hub v2.5</p>
                            {isCheckingSystem ? <div className="py-10"><Icon name="refresh-cw" className="animate-spin text-indigo-500 mx-auto" size={32}/><p className="mt-4 font-bold text-slate-500 uppercase text-[10px]">Menghubungkan Database...</p></div> : (
                                <form onSubmit={handleLogin} className="space-y-6 text-left">
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">ID Login</label>
                                        <input required placeholder="Username" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginName} onChange={e=>setLoginName(e.target.value)} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-black text-slate-500 uppercase tracking-widest ml-2">Sandi / PIN</label>
                                        <input required type="password" placeholder="Password" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                                    </div>
                                    {loginError && <p className="text-rose-600 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl">{loginError}</p>}
                                    <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest active:scale-95">Masuk Sistem</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-screen overflow-hidden relative font-sans">
                    {/* SIDEBAR - SHARPER TEXT */}
                    {isMobileMenuOpen && <div className="absolute inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={()=>setIsMobileMenuOpen(false)}></div>}
                    <aside className={`absolute md:relative z-50 w-72 h-full bg-indigo-950 text-white flex flex-col shadow-2xl transition-transform duration-500 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shrink-0`}>
                        <div className="p-10 border-b border-white/5 flex flex-col items-center">
                            <Icon name="warehouse" size={48} className="text-indigo-400 mb-4" />
                            <h1 className="font-black text-2xl italic tracking-tighter">GROSIR PINTAR</h1>
                            <p className="text-[10px] font-bold text-indigo-400/70 uppercase tracking-[0.4em] mt-1">Sistem Terpadu</p>
                        </div>
                        <nav className="flex-1 py-8 px-6 space-y-4 overflow-y-auto no-scrollbar">
                            {menuList.map(m => (
                                <button key={m.id} onClick={()=>{setActiveMenu(m.id); setIsMobileMenuOpen(false);}} 
                                    className={`w-full flex items-center gap-5 p-4 rounded-2xl font-bold text-[13px] tracking-wide transition-all ${activeMenu === m.id ? 'bg-white text-indigo-950 shadow-xl scale-[1.02]' : 'text-indigo-100/60 hover:text-white hover:bg-white/5'}`}>
                                    <Icon name={m.icon} size={22} className={activeMenu === m.id ? 'text-indigo-600' : ''} /> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 border-t border-white/5 bg-indigo-900/30">
                            <div className="bg-white/10 p-5 rounded-2xl flex items-center justify-between">
                                <div className="min-w-0 pr-2">
                                    <p className="text-xs font-black truncate text-white">{currentUser.toUpperCase()}</p>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">

                            {activeMenu === 'gudang' && userRole === 'ADMIN' && (

                                                            <input type="radio" name="adjDir" checked={adjustDir === 'MINUS'} onChange={() => setAdjustDir('MINUS')} className="hidden"/>

                                                        </label>

                                                </div>
                                            )}
                                            <div className="min-h-[100px]">
                                                {detectedItem ? (
                                                    <div className="p-8 bg-indigo-600 rounded-[2.5rem] text-white shadow-xl flex items-center gap-6 animate-in slide-in-from-top-4 border-4 border-indigo-500/20">

                                                        </div>
                                                    </div>

                                            <Icon name="search" size={20} className="text-slate-400"/>

                                    </div>

                                        <div className="flex-1">
                                            <div className="flex justify-between mb-4"><p className="font-black text-[11px] uppercase tracking-widest text-slate-500">Penyelesaian Audit Hari Ini</p><p className="font-black text-indigo-600 text-xl">{Math.round((liveData?.masterItems.filter(i=>i.opnamedToday).length / liveData?.masterItems.length) * 100 || 0)}%</p></div>

                                        <div className="text-right hidden sm:block">

                                                <button onClick={()=>handleSortOpname('name')} className={`text-xs font-black tracking-widest uppercase flex items-center gap-2 ${sortConfigOpname.key==='name'?'text-indigo-600':'text-slate-400'}`}>URUTKAN A-Z <Icon name={sortConfigOpname.direction==='asc'?'arrow-down-z-a':'arrow-up-z-a'} size={14}/></button>

                                                                                {item.selisihOpname > 0 ? '+' : ''}{item.selisihOpname} BKS
                                                                            </span>

                                                                        value={inlineOpnameQty[item.id] !== undefined ? inlineOpnameQty[item.id] : ''} onChange={(e) => handleInlineOpnameChange(item.id, e.target.value)} />
                                                                    <select value={inlineOpnameUom[item.id] || 'Bal'} onChange={(e) => setInlineOpnameUom(prev => ({...prev, [item.id]: e.target.value}))}

                                            <p className="text-xs font-black text-slate-400 uppercase tracking-widest">Total {processedOpnameData.length} Barang</p>
                                        </div>
                                    </div>
                                </div>
                            )}

                                                            <td className="p-8 text-right font-black text-2xl text-slate-800">{item.stok} <span className="text-[10px] text-slate-400 font-bold">BKS</span><br/><span className="text-[10px] text-emerald-600 font-bold whitespace-nowrap">{getStokInfo(item.stok, item.isiSlop, item.isiBal)}</span></td>
                                                            <td className="p-8 text-center whitespace-nowrap space-x-3">

                                                            </td>
                                                        </tr>

                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteUserTarget(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-xs tracking-widest hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={async ()=>{await apiCall({action: 'delete_user', username: deleteUserTarget}); setDeleteUserTarget(null); setCustomAlert("Akses dicabut.");}} className="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold uppercase text-xs tracking-widest shadow-xl shadow-orange-200 hover:bg-orange-700 transition-colors">Ya, Cabut</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-20 h-20 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner border-4 border-white"><Icon name="check-circle-2" size={44} /></div>
                                <h3 className="font-black text-slate-800 text-2xl mb-4 italic uppercase tracking-tight">Sistem Terupdate</h3>
                                <p className="text-slate-500 text-sm font-medium mb-10 leading-relaxed tracking-wide">{customAlert}</p>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white font-black py-6 rounded-2xl uppercase text-xs tracking-[0.3em] shadow-xl hover:bg-black transition-all">Selesai</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
