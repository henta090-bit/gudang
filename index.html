<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grosir Pintar POS v2.5</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- HTML5 QRCode Scanner untuk Kamera HP/iPad -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Style adjustments for HTML5 QR Code Scanner */
        #reader button { padding: 10px 20px; background-color: #4f46e5; color: white; border-radius: 12px; font-weight: 800; margin: 4px; cursor: pointer; border: none; text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em;}
        #reader select { padding: 12px; border-radius: 12px; border: 2px solid #e2e8f0; margin-bottom: 10px; width: 100%; font-weight: bold; outline: none;}
        #reader a { display: none !important; }
        #reader { border: none !important; }
        #reader video { border-radius: 16px; object-fit: cover; }
        .text-sharp { text-rendering: optimizeLegibility; -webkit-font-smoothing: antialiased; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden text-sharp">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;
        
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            // --- KONFIGURASI URL API ---
            const API_URL = "https://script.google.com/macros/s/AKfycbwolB1qiZh8mTgngPufaSiYHfu8LcDYBf_kQjueOxAme-ADXZq8WGS6xEYiB0ilfMSQ/exec";

            const [currentUser, setCurrentUser] = useState(localStorage.getItem('pos_user') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('pos_role') || 'ADMIN');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pos_user'));
            const [loginName, setLoginName] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('pos_role') === 'STAFF' ? 'opname' : 'dashboard');
            const [liveData, setLiveData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(true);
            const [isCheckingSystem, setIsCheckingSystem] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            const syncRef = useRef(false);

            // STATE FORM & MODAL
            const [scanBarcode, setScanBarcode] = useState('');
            const [scanType, setScanType] = useState('IN');
            const [adjustDir, setAdjustDir] = useState('MINUS');
            const [scanQty, setScanQty] = useState(''); // DIUBAH: Default dikosongkan agar ketik angka lebih mudah
            const [scanUom, setScanUom] = useState('Bungkus');
            const [scanNote, setScanNote] = useState('');
            
            const [opnameBarcode, setOpnameBarcode] = useState('');
            const [opnameQty, setOpnameQty] = useState('');
            const [opnameUom, setOpnameUom] = useState('Bal'); 
            
            const [detectedItem, setDetectedItem] = useState(null);
            const [scanSuggestions, setScanSuggestions] = useState([]);
            const [activeScanSuggestionIndex, setActiveScanSuggestionIndex] = useState(-1);
            
            const [opnameItem, setOpnameItem] = useState(null);
            const [opnameSuggestions, setOpnameSuggestions] = useState([]);
            const [activeOpnameSuggestionIndex, setActiveOpnameSuggestionIndex] = useState(-1);

            const [inlineOpnameQty, setInlineOpnameQty] = useState({});
            const [inlineOpnameUom, setInlineOpnameUom] = useState({});

            const [sortConfigOpname, setSortConfigOpname] = useState({ key: 'name', direction: 'asc' });
            const [currentPageOpname, setCurrentPageOpname] = useState(1);
            
            const [sortConfigMaster, setSortConfigMaster] = useState({ key: 'name', direction: 'asc' });
            const [currentPageMaster, setCurrentPageMaster] = useState(1);

            const [currentPageSelisih, setCurrentPageSelisih] = useState(1);
            
            const itemsPerPage = 50; 

            const [filterDate, setFilterDate] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [activeReportTab, setActiveReportTab] = useState('mutasi');
            const [kartuStokItem, setKartuStokItem] = useState('');

            const [customAlert, setCustomAlert] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [deleteUserTarget, setDeleteUserTarget] = useState(null);
            const [isAddMasterOpen, setIsAddMasterOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [newMaster, setNewMaster] = useState({ idBarang: '', namaBarang: '', barcodeBungkus: '', barcodeSlop: '', barcodeBal: '', isiSlop: 12, isiBal: 10, stokAwal: 0 });
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [isEditUserMode, setIsEditUserMode] = useState(false);
            const [newUser, setNewUser] = useState({ oldUsername: '', username: '', password: '', role: 'STAFF' });

            const [isScannerOpen, setIsScannerOpen] = useState(false);
            const [scannerTarget, setScannerTarget] = useState(null); 
            const scannerRef = useRef(null);
            const barcodeInputRef = useRef(null);

            // --- DATA FETCHING ---
            const fetchData = async (silent = false) => {
                if (!API_URL || !API_URL.startsWith("http")) { 
                    setIsSyncing(false); setIsCheckingSystem(false); return; 
                }
                if (syncRef.current && silent) return; 
                
                syncRef.current = true;
                if (!silent) setIsLoading(true);
                setIsSyncing(true);
                
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    const res = await fetch(API_URL, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    
                    if (!res.ok) throw new Error("Server response not ok");
                    const data = await res.json();
                    setLiveData(data);
                    setLoginError('');
                } catch (e) { 
                    if (!silent) setLoginError("Koneksi gagal. Cek URL API atau internet.");
                }
                finally { 
                    setIsLoading(false); setIsSyncing(false); setIsCheckingSystem(false); syncRef.current = false;
                }
            };

            useEffect(() => { 
                fetchData(); 
                const interval = setInterval(() => { fetchData(true); }, 30000); 
                return () => clearInterval(interval);
            }, []);

            // --- AUTO SCROLL DROPDOWNS ---
            useEffect(() => {
                if (activeScanSuggestionIndex >= 0) {
                    const el = document.getElementById(`scan-suggest-${activeScanSuggestionIndex}`);
                    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }, [activeScanSuggestionIndex]);

            useEffect(() => {
                if (activeOpnameSuggestionIndex >= 0) {
                    const el = document.getElementById(`opname-suggest-${activeOpnameSuggestionIndex}`);
                    if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }, [activeOpnameSuggestionIndex]);

            // --- SCANNER LOGIC ---
            useEffect(() => {
                if (isScannerOpen) {
                    const formats = window.Html5QrcodeSupportedFormats ? [
                        window.Html5QrcodeSupportedFormats.EAN_13, window.Html5QrcodeSupportedFormats.EAN_8,
                        window.Html5QrcodeSupportedFormats.UPC_A, window.Html5QrcodeSupportedFormats.UPC_E,
                        window.Html5QrcodeSupportedFormats.CODE_128, window.Html5QrcodeSupportedFormats.CODE_39,
                        window.Html5QrcodeSupportedFormats.QR_CODE
                    ] : undefined;

                    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0, formatsToSupport: formats }, false);
                    scannerRef.current = html5QrcodeScanner;
                    
                    html5QrcodeScanner.render((decodedText) => {
                        if (scannerTarget === 'mutasi') setScanBarcode(decodedText);
                        else if (scannerTarget === 'opname') setOpnameBarcode(decodedText);
                        else if (scannerTarget === 'master_bungkus') setNewMaster(prev => ({ ...prev, barcodeBungkus: decodedText }));
                        else if (scannerTarget === 'master_slop') setNewMaster(prev => ({ ...prev, barcodeSlop: decodedText }));
                        else if (scannerTarget === 'master_bal') setNewMaster(prev => ({ ...prev, barcodeBal: decodedText }));
                        
                        try { navigator.vibrate && navigator.vibrate(200); } catch(e){}
                        html5QrcodeScanner.clear(); setIsScannerOpen(false);
                    }, (error) => {});
                }
                return () => { if (scannerRef.current) scannerRef.current.clear().catch(e => {}); };
            }, [isScannerOpen, scannerTarget]);

            const findItemExact = (inputStr) => {
                const clean = String(inputStr).trim().toLowerCase();
                if (!clean || !liveData?.masterItems) return null;
                for (let item of liveData.masterItems) {
                    if (String(item.bBungkus).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                    if (String(item.bSlop).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Slop' };
                    if (String(item.bBal).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.name).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.id).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                }
                return null;
            };

            // SCAN SUGGESTIONS & KEYBOARD NAV
            useEffect(() => { setActiveScanSuggestionIndex(-1); }, [scanSuggestions]);
            useEffect(() => {
                const found = findItemExact(scanBarcode);
                setDetectedItem(found);
                if(found) { setScanUom(found.defaultUom); setScanSuggestions([]); } 
                else {
                    const lowerInput = scanBarcode.toLowerCase().trim();
                    if(lowerInput.length > 1) {
                        const suggestions = liveData?.masterItems?.filter(i => String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput)).slice(0, 5) || [];
                        setScanSuggestions(suggestions);
                    } else { setScanSuggestions([]); }
                }
            }, [scanBarcode, liveData]);

            const handleScanKeyDown = (e) => {
                if (scanSuggestions.length > 0 && !detectedItem) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        setActiveScanSuggestionIndex(prev => (prev < scanSuggestions.length - 1 ? prev + 1 : prev));
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        setActiveScanSuggestionIndex(prev => (prev > 0 ? prev - 1 : 0));
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        const selectedIndex = activeScanSuggestionIndex >= 0 ? activeScanSuggestionIndex : 0;
                        if (selectedIndex < scanSuggestions.length) {
                            setScanBarcode(scanSuggestions[selectedIndex].name);
                            setScanSuggestions([]);
                            setActiveScanSuggestionIndex(-1);
                        }
                    }
                }
            };

            // OPNAME SUGGESTIONS & KEYBOARD NAV
            useEffect(() => { setActiveOpnameSuggestionIndex(-1); }, [opnameSuggestions]);
            useEffect(() => {
                const found = findItemExact(opnameBarcode);
                setOpnameItem(found);
                if(found) { setOpnameUom(found.defaultUom); setOpnameSuggestions([]); } 
                else {
                    const lowerInput = opnameBarcode.toLowerCase().trim();
                    if(lowerInput.length > 1) {
                        const suggestions = liveData?.masterItems?.filter(i => String(i.name).toLowerCase().includes(lowerInput) || String(i.id).toLowerCase().includes(lowerInput)).slice(0, 5) || [];
                        setOpnameSuggestions(suggestions);
                    } else { setOpnameSuggestions([]); }
                }
            }, [opnameBarcode, liveData]);

            const handleOpnameKeyDown = (e) => {
                if (opnameSuggestions.length > 0 && !opnameItem) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        setActiveOpnameSuggestionIndex(prev => (prev < opnameSuggestions.length - 1 ? prev + 1 : prev));
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        setActiveOpnameSuggestionIndex(prev => (prev > 0 ? prev - 1 : 0));
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        const selectedIndex = activeOpnameSuggestionIndex >= 0 ? activeOpnameSuggestionIndex : 0;
                        if (selectedIndex < opnameSuggestions.length) {
                            setOpnameBarcode(opnameSuggestions[selectedIndex].name);
                            setOpnameSuggestions([]);
                            setActiveOpnameSuggestionIndex(-1);
                        }
                    }
                }
            };

            // --- OPTIMASI TABEL & PAGINASI ---
            useEffect(() => { 
                setCurrentPageOpname(1); 
                setCurrentPageMaster(1); 
                setCurrentPageSelisih(1);
            }, [searchTerm, activeMenu, activeReportTab]);

            const processedOpnameData = useMemo(() => {
                let items = (liveData?.masterItems || []).filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()) || i.id.toLowerCase().includes(searchTerm.toLowerCase()));
                if (sortConfigOpname.key) {
                    items.sort((a, b) => {
                        let aVal = a[sortConfigOpname.key]; let bVal = b[sortConfigOpname.key];
                        if (sortConfigOpname.key === 'status') { aVal = a.opnamedToday ? 1 : 0; bVal = b.opnamedToday ? 1 : 0; }
                        if (typeof aVal === 'string') return sortConfigOpname.direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                        return sortConfigOpname.direction === 'asc' ? aVal - bVal : bVal - aVal;
                    });
                }
                return items;
            }, [liveData, searchTerm, sortConfigOpname]);

            const totalPagesOpname = Math.ceil(processedOpnameData.length / itemsPerPage) || 1;
            const currentOpnameItems = processedOpnameData.slice((currentPageOpname - 1) * itemsPerPage, currentPageOpname * itemsPerPage);

            const handleSortOpname = (key) => {
                let direction = 'asc';
                if (sortConfigOpname.key === key && sortConfigOpname.direction === 'asc') direction = 'desc';
                setSortConfigOpname({ key, direction });
            };

            const processedMasterData = useMemo(() => {
                let items = (liveData?.masterItems || []).filter(i => 
                    i.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                    i.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                    String(i.bBungkus).includes(searchTerm)
                );
                if (sortConfigMaster.key) {
                    items.sort((a, b) => {
                        let aVal = a[sortConfigMaster.key]; let bVal = b[sortConfigMaster.key];
                        if (typeof aVal === 'string') return sortConfigMaster.direction === 'asc' ? aVal.localeCompare(bVal) : bVal.localeCompare(aVal);
                        return sortConfigMaster.direction === 'asc' ? aVal - bVal : bVal - aVal;
                    });
                }
                return items;
            }, [liveData, searchTerm, sortConfigMaster]);

            const totalPagesMaster = Math.ceil(processedMasterData.length / itemsPerPage) || 1;
            const currentMasterItems = processedMasterData.slice((currentPageMaster - 1) * itemsPerPage, currentPageMaster * itemsPerPage);

            const handleSortMaster = (key) => {
                let direction = 'asc';
                if (sortConfigMaster.key === key && sortConfigMaster.direction === 'asc') direction = 'desc';
                setSortConfigMaster({ key, direction });
            };

            const filteredTransactions = (liveData?.transactions || []).filter(t => {
                const mSearch = t.item.toLowerCase().includes(searchTerm.toLowerCase()) || t.user.toLowerCase().includes(searchTerm.toLowerCase());
                const mDate = filterDate ? t.date === filterDate : true; let mType = true;
                if (filterType === 'IN') mType = t.type === 'IN' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'OUT') mType = t.type === 'OUT' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'ADJUST') mType = t.id.startsWith('OPN-') || t.note.includes('ADJUST');
                return mSearch && mDate && mType;
            });

            // Laporan Selisih (Optimasi Paginasi agar tidak crash)
            const filteredMasterSelisih = (liveData?.masterItems || []).filter(i => i.name.toLowerCase().includes(searchTerm.toLowerCase()) || i.id.toLowerCase().includes(searchTerm.toLowerCase()));
            const totalPagesSelisih = Math.ceil(filteredMasterSelisih.length / itemsPerPage) || 1;
            const currentSelisihItems = filteredMasterSelisih.slice((currentPageSelisih - 1) * itemsPerPage, currentPageSelisih * itemsPerPage);

            // GLOBAL LATEST TRANSACTIONS FOR MUTASI WIDGET
            const globalRecentMutasi = (liveData?.transactions || []).filter(t => !t.id.startsWith('OPN-') && !t.note.includes('ADJUST')).slice(0, 4);

            const filteredLowStock = (liveData?.lowStock || []).filter(item => item.name.toLowerCase().includes(searchTerm.toLowerCase()));

            // KALKULASI TOP 3 BARANG KELUAR BULAN INI
            const topBarangKeluar = useMemo(() => {
                if (!liveData?.transactions || !liveData?.masterItems) return [];
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                let sales = {};
                liveData.transactions.forEach(t => {
                    if (t.type === 'OUT' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST')) {
                        const tDate = new Date(t.date);
                        if (tDate.getMonth() === currentMonth && tDate.getFullYear() === currentYear) {
                            let qtyBase = Number(t.qty);
                            if (t.uom === 'Bal' || t.uom === 'Slop') {
                                const mItem = liveData.masterItems.find(i => i.name === t.item);
                                if (mItem) {
                                    if (t.uom === 'Bal') qtyBase = Number(t.qty) * mItem.isiSlop * mItem.isiBal;
                                    if (t.uom === 'Slop') qtyBase = Number(t.qty) * mItem.isiSlop;
                                }
                            }
                            sales[t.item] = (sales[t.item] || 0) + qtyBase;
                        }
                    }
                });

                return Object.entries(sales)
                    .map(([name, total]) => ({ name, total }))
                    .sort((a, b) => b.total - a.total)
                    .slice(0, 3);
            }, [liveData]);

            const getKartuStokData = () => {
                if (!kartuStokItem) return [];
                const selectedItemData = liveData?.masterItems?.find(i => i.id === kartuStokItem);
                if (!selectedItemData) return [];
                let currentSisa = selectedItemData.stok || 0;
                const logs = [...(liveData?.transactions || [])].filter(t => t.item === selectedItemData.name);
                return logs.map(trx => {
                    let qtyBase = Number(trx.qty);
                    if (trx.uom === 'Bal') qtyBase = Number(trx.qty) * selectedItemData.isiSlop * selectedItemData.isiBal;
                    if (trx.uom === 'Slop') qtyBase = Number(trx.qty) * selectedItemData.isiSlop;
                    const isMasuk = trx.type === 'IN'; const isKeluar = trx.type === 'OUT';
                    const row = { ...trx, masukBase: isMasuk ? qtyBase : 0, keluarBase: isKeluar ? qtyBase : 0, sisa: currentSisa };
                    if (isMasuk) currentSisa -= qtyBase; if (isKeluar) currentSisa += qtyBase;
                    return row;
                });
            };

            // --- API HANDLERS ---
            const handleLogin = (e) => {
                e.preventDefault();
                if (!liveData || !liveData.users) { setLoginError("Menghubungkan ke server..."); fetchData(); return; }
                const found = liveData?.users?.find(u => u.username.toLowerCase() === loginName.trim().toLowerCase() && u.password === loginPassword);
                if (found) {
                    localStorage.setItem('pos_user', found.username); localStorage.setItem('pos_role', found.role);
                    setCurrentUser(found.username); setUserRole(found.role); setIsLoggedIn(true); setActiveMenu(found.role === 'STAFF' ? 'opname' : 'dashboard');
                } else { setLoginError("ID atau PIN tidak terdaftar!"); }
            };

            const handleLogout = () => { localStorage.clear(); location.reload(); };

            const apiCall = async (payload) => {
                syncRef.current = true; setIsSyncing(true);
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if(result.status === 'success') { syncRef.current = false; fetchData(true); return true; }
                } catch(e) { console.error("API Call error:", e); }
                syncRef.current = false; fetchData(true); return false;
            };

            const simpanScan = async (e) => {
                e.preventDefault();
                if(syncRef.current || !detectedItem) return;
                const payload = { action: 'scan', barcode: detectedItem.id, type: scanType === 'ADJUST' ? (adjustDir === 'MINUS' ? 'OUT' : 'IN') : scanType, qty: scanQty, uom: scanUom, user: currentUser, note: scanType === 'ADJUST' ? `ADJUST: ${scanNote}` : '' };
                setScanBarcode(''); setScanQty(''); setScanNote(''); setDetectedItem(null); setScanSuggestions([]); // DIUBAH: Reset dikosongkan
                await apiCall(payload);
            };

            const simpanOpname = async (e) => {
                e.preventDefault();
                if(syncRef.current || !opnameItem) return;
                const payload = { action: 'opname', barcode: opnameItem.id, qty: opnameQty, uom: opnameUom, user: currentUser };
                setOpnameBarcode(''); setOpnameQty(''); setOpnameItem(null); setOpnameSuggestions([]);
                if(barcodeInputRef.current) barcodeInputRef.current.focus();
                await apiCall(payload);
            };

            const handleInlineOpnameChange = (id, value) => { setInlineOpnameQty(prev => ({ ...prev, [id]: value })); };

            const simpanInlineOpname = async (item) => {
                const qty = inlineOpnameQty[item.id];
                const uom = inlineOpnameUom[item.id] || 'Bal'; 
                if (qty === undefined || qty === '') return;
                if (syncRef.current) return;
                const payload = { action: 'opname', barcode: item.id, qty: qty, uom: uom, user: currentUser };
                setInlineOpnameQty(prev => ({ ...prev, [item.id]: '' }));
                await apiCall(payload);
                // Tidak ada popup peringatan (Mode Cepat)
            };

            const simpanMaster = async (e) => {
                e.preventDefault();
                if (syncRef.current) return;
                const success = await apiCall({ action: isEditMode ? 'edit_master' : 'add_master', ...newMaster });
                if(success) { setIsAddMasterOpen(false); setCustomAlert("Master Produk disimpan!"); }
            };

            const hapusMaster = async () => {
                if (syncRef.current) return;
                const success = await apiCall({ action: 'delete_master', idBarang: deleteTarget });
                if(success) { setDeleteTarget(null); setCustomAlert("Produk dihapus."); }
            };

            // UI HELPERS
            const handleExportCSV = (type) => {
                let csvRows = [];
                let filename = `Laporan_${new Date().toLocaleDateString()}.csv`;
                if (type === 'mutasi') {
                    csvRows = [["Tanggal", "Waktu", "Tipe", "Produk", "Jumlah", "Satuan", "Operator", "Catatan"].join(","), ...filteredTransactions.map(t => `"${t.date}","${t.time}","${t.type}","${t.item}","${t.qty}","${t.uom}","${t.user}","${t.note}"`)];
                } else if (type === 'rekap_selisih') {
                    csvRows = [["Produk", "Sistem", "Fisik", "Selisih"].join(","), ...(filteredMasterSelisih).map(i => `"${i.name}","${i.stok - i.selisihOpname}","${i.stok}","${i.selisihOpname}"`)];
                } else if (type === 'kartu') {
                    if (!kartuStokItem) return setCustomAlert("Pilih barang terlebih dahulu di menu dropdown Kartu Stok.");
                    const kartuData = getKartuStokData();
                    const selectedItem = liveData?.masterItems?.find(i => i.id === kartuStokItem);
                    const headers = ["Tanggal", "Waktu", "No Bukti", "Keterangan", "Masuk (Bks)", "Keluar (Bks)", "Sisa Saldo (Bks)", "Operator"];
                    csvRows = [headers.join(","), ...kartuData.map(t => `"${t.date}","${t.time}","${t.id}","${t.note}","${t.masukBase}","${t.keluarBase}","${t.sisa}","${t.user}"`)];
                    filename = `Kartu_Stok_${selectedItem?.name}.csv`;
                }
                const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
                const a = document.createElement("a"); a.href = window.URL.createObjectURL(blob); a.download = filename; a.click();
            };

            const getStokInfo = (bks, iS, iB) => {
                if (bks === 0) return "Kosong";
                const bPerBal = iS * iB; const bal = Math.floor(bks / bPerBal);
                const sB = bks % bPerBal; const slop = Math.floor(sB / iS); const bungkus = sB % iS;
                let res = [];
                if (bal > 0) res.push(`${bal} Bal`); if (slop > 0) res.push(`${slop} Slop`); if (bungkus > 0) res.push(`${bungkus} Bks`);
                return res.join(" + ");
            };

            const menuList = [
                { id: 'dashboard', label: 'DASHBOARD', icon: 'layout-dashboard', role: 'ADMIN' },
                { id: 'gudang', label: 'MUTASI GUDANG', icon: 'scan-barcode', role: 'ADMIN' },
                { id: 'opname', label: 'STOK OPNAME', icon: 'clipboard-list', role: 'ALL' },
                { id: 'inventory', label: 'MASTER BARANG', icon: 'package', role: 'ADMIN' },
                { id: 'transactions', label: 'PUSAT LAPORAN', icon: 'file-spreadsheet', role: 'ADMIN' },
                { id: 'users', label: 'MANAJEMEN USER', icon: 'users', role: 'ADMIN' },
            ].filter(m => m.role === 'ALL' || userRole === 'ADMIN');

            // --- UI RENDER ---
            if (!isLoggedIn) {
                return (
                    <div className="flex h-[100dvh] items-center justify-center p-6 bg-slate-100 relative overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-30">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-indigo-400 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 right-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-200 z-10 fade-in text-center text-slate-800">
                            <div className="flex justify-center mb-8"><div className="bg-indigo-600 p-5 rounded-[1.5rem] text-white shadow-xl shadow-indigo-200"><Icon name="shield-check" size={36}/></div></div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase italic">Grosir Pintar</h1>
                            <p className="text-slate-500 mb-8 text-[10px] font-bold tracking-[0.3em] uppercase mt-1">Enterprise Hub v2.5</p>
                            {isCheckingSystem ? <div className="py-8"><Icon name="refresh-cw" className="animate-spin text-indigo-500 mx-auto" size={28}/><p className="mt-4 font-bold text-slate-500 uppercase text-[10px]">Memuat Database...</p></div> : (
                                <form onSubmit={handleLogin} className="space-y-5 text-left">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">ID Login</label>
                                        <input required placeholder="Username" className="w-full p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all text-sm" value={loginName} onChange={e=>setLoginName(e.target.value)} />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Sandi / PIN</label>
                                        <input required type="password" placeholder="Password" className="w-full p-4 bg-slate-50 rounded-xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all text-sm" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                                    </div>
                                    {loginError && <p className="text-rose-600 text-xs font-bold text-center bg-rose-50 p-2 rounded-lg">{loginError}</p>}
                                    <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest text-xs active:scale-95">Masuk Sistem</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex h-[100dvh] overflow-hidden relative font-sans">
                    {/* SIDEBAR */}
                    {isMobileMenuOpen && <div className="absolute inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={()=>setIsMobileMenuOpen(false)}></div>}
                    <aside className={`absolute md:relative z-50 w-64 h-full bg-indigo-950 text-white flex flex-col shadow-2xl transition-transform duration-500 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shrink-0`}>
                        <div className="p-6 border-b border-white/5 flex flex-col items-center">
                            <Icon name="warehouse" size={36} className="text-indigo-400 mb-3" />
                            <h1 className="font-black text-xl italic tracking-tighter">GROSIR PINTAR</h1>
                            <p className="text-[9px] font-bold text-indigo-400/70 uppercase tracking-[0.3em] mt-1">Sistem Terpadu</p>
                        </div>
                        <nav className="flex-1 py-6 px-4 space-y-2 overflow-y-auto no-scrollbar">
                            {menuList.map(m => (
                                <button key={m.id} onClick={()=>{setActiveMenu(m.id); setIsMobileMenuOpen(false);}} 
                                    className={`w-full flex items-center gap-4 p-3.5 rounded-xl font-bold text-xs tracking-wide transition-all ${activeMenu === m.id ? 'bg-white text-indigo-950 shadow-md' : 'text-indigo-100/60 hover:text-white hover:bg-white/5'}`}>
                                    <Icon name={m.icon} size={18} className={activeMenu === m.id ? 'text-indigo-600' : ''} /> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-white/5 bg-indigo-900/30">
                            <div className="bg-white/10 p-4 rounded-xl flex items-center justify-between">
                                <div className="min-w-0 pr-2">
                                    <p className="text-[11px] font-black truncate text-white">{currentUser.toUpperCase()}</p>
                                    <p className="text-[9px] font-bold text-indigo-300 uppercase tracking-widest">{userRole === 'ADMIN' ? 'SUPER ADMIN' : 'STAFF GUDANG'}</p>
                                </div>
                                <button onClick={handleLogout} className="text-white/40 hover:text-rose-400 transition-colors p-2"><Icon name="log-out" size={16}/></button>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTAINER FIXED FOR IPAD */}
                    <main className="flex-1 flex flex-col bg-slate-50/50 overflow-hidden relative">
                        <header className="p-4 md:p-6 border-b border-slate-100 flex justify-between items-center bg-white z-10 shrink-0 shadow-sm">
                            <div className="flex items-center gap-4 flex-1">
                                <button className="md:hidden text-slate-500 p-2 hover:bg-slate-50 rounded-xl" onClick={()=>setIsMobileMenuOpen(true)}><Icon name="menu" size={24}/></button>
                                <div className="flex-1 md:max-w-md relative">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={16}/></div>
                                    <input placeholder="Pencarian Cepat..." className="w-full pl-10 pr-4 py-2.5 bg-slate-50 rounded-xl border border-slate-200 outline-none focus:ring-2 ring-indigo-100 font-bold text-xs text-slate-700 transition-shadow" value={searchTerm} onChange={e=>{setSearchTerm(e.target.value); setCurrentPageOpname(1); setCurrentPageMaster(1); setCurrentPageSelisih(1);}} />
                                </div>
                            </div>
                            <div className={`hidden md:flex items-center px-4 py-2 rounded-xl text-[10px] font-black tracking-widest border shadow-sm ${isSyncing ? 'bg-indigo-50 border-indigo-200 text-indigo-700 animate-pulse' : 'bg-emerald-50 border-emerald-200 text-emerald-700'}`}>
                                <Icon name="database" size={14} className="mr-2"/> {isSyncing ? 'SINGKRON...' : 'DATABASE ONLINE'}
                            </div>
                        </header>
                        
                        {/* VIEW AREA */}
                        <div className="flex-1 p-2 md:p-6 flex flex-col overflow-hidden relative min-h-0 w-full">
                            
                            {/* DASHBOARD VIEW */}
                            {activeMenu === 'dashboard' && userRole === 'ADMIN' && (
                                <div className="fade-in overflow-y-auto h-full w-full no-scrollbar pb-10 space-y-6">
                                    <div className="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8 flex items-center justify-between">
                                        <div><h3 className="font-black text-slate-800 text-xl italic">Halo, {currentUser}!</h3><p className="text-slate-500 text-xs mt-2 font-medium">Sistem sinkronisasi berjalan normal.</p></div>
                                        <Icon name="check-circle-2" size={48} className="text-emerald-500 opacity-20"/>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                        {liveData?.stats?.map((s,i) => (
                                            <div key={i} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between h-32">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{s.title}</p>
                                                <p className="text-2xl font-black text-slate-800 mt-1">{s.value}</p>
                                                <div className="mt-2"><span className="px-2 py-1 bg-indigo-50 text-indigo-700 text-[9px] font-bold rounded uppercase">{s.trend}</span></div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                        {/* Widget Stok Kritis */}
                                        <div className="bg-indigo-950 rounded-3xl shadow-xl p-6 text-white flex flex-col justify-center">
                                            <h3 className="font-black text-indigo-300 uppercase text-xs tracking-widest mb-4 flex items-center gap-2"><Icon name="alert-circle" size={16}/> Stok Dibawah Batas</h3>
                                            <div className="space-y-3 max-h-48 overflow-y-auto no-scrollbar">
                                                {filteredLowStock.slice(0,5).map((item, idx) => (
                                                    <div key={idx} className="flex justify-between items-center text-xs border-b border-white/10 pb-2">
                                                        <span className="font-bold truncate pr-3 text-indigo-50">{item.name}</span>
                                                        <span className="font-black text-indigo-400 text-[10px] shrink-0 bg-white/10 px-2 py-1 rounded-md">{item.sisa} Bks</span>
                                                    </div>
                                                ))}
                                                {filteredLowStock.length === 0 && <p className="text-white/30 italic text-xs">Stok aman terkendali.</p>}
                                            </div>
                                        </div>

                                        {/* Widget Top 3 Terlaris */}
                                        <div className="bg-indigo-600 rounded-3xl shadow-xl p-6 text-white flex flex-col justify-center">
                                            <h3 className="font-black text-indigo-200 uppercase text-xs tracking-widest mb-4 flex items-center gap-2"><Icon name="trending-up" size={16}/> Top 3 Penjualan Bulan Ini</h3>
                                            <div className="space-y-3 max-h-48 overflow-y-auto no-scrollbar">
                                                {topBarangKeluar.map((item, idx) => (
                                                    <div key={idx} className="flex items-center gap-4 bg-white/10 p-2.5 rounded-xl border border-white/5">
                                                        <div className={`w-7 h-7 rounded-full flex items-center justify-center font-black text-slate-900 text-xs shrink-0 ${idx === 0 ? 'bg-yellow-400' : idx === 1 ? 'bg-slate-300' : 'bg-orange-400'}`}>
                                                            {idx + 1}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <p className="font-bold text-white text-xs truncate">{item.name}</p>
                                                        </div>
                                                        <div className="font-black text-white text-[10px] shrink-0">{item.total} Bks</div>
                                                    </div>
                                                ))}
                                                {topBarangKeluar.length === 0 && <p className="text-white/40 italic text-xs">Belum ada penjualan bulan ini.</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* MUTASI GUDANG VIEW */}
                            {activeMenu === 'gudang' && userRole === 'ADMIN' && (
                                <div className="fade-in overflow-y-auto h-full w-full no-scrollbar pb-10">
                                    <h2 className="text-2xl font-black text-slate-800 flex items-center gap-3 italic tracking-tighter uppercase mb-6"><Icon name="warehouse" className="text-indigo-600" size={24} /> Mutasi Harian</h2>
                                    <div className="flex flex-col md:flex-row gap-6 max-w-6xl mx-auto">
                                        <div className="w-full md:w-2/3 space-y-6">
                                            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-slate-200 relative">
                                                <form onSubmit={simpanScan} className="space-y-6">
                                                    <div className="grid grid-cols-3 gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                                                        {[ { id: 'IN', label: 'MASUK', activeStyle: 'bg-emerald-500 text-white shadow-md scale-105', idleStyle: 'bg-transparent text-emerald-600 hover:bg-emerald-50' }, { id: 'OUT', label: 'KELUAR', activeStyle: 'bg-orange-500 text-white shadow-md scale-105', idleStyle: 'bg-transparent text-orange-600 hover:bg-orange-50' }, { id: 'ADJUST', label: 'KOREKSI', activeStyle: 'bg-indigo-500 text-white shadow-md scale-105', idleStyle: 'bg-transparent text-indigo-600 hover:bg-indigo-50' } ].map(opt => (
                                                            <button key={opt.id} type="button" onClick={() => setScanType(opt.id)} className={`py-3 rounded-xl font-black text-[10px] tracking-widest transition-all border-2 ${scanType === opt.id ? opt.activeStyle : opt.idleStyle}`}>{opt.label}</button>
                                                        ))}
                                                    </div>
                                                    <div className="space-y-3">
                                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">PILIH PRODUK / SCAN</label>
                                                        <div className="flex flex-col sm:flex-row gap-3">
                                                            <div className="flex-1 relative">
                                                                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="barcode" size={18} /></div>
                                                                <input required autoFocus type="text" value={scanBarcode} onChange={(e)=>setScanBarcode(e.target.value)} onKeyDown={handleScanKeyDown} placeholder="Ketik nama (Panah ↓ ↑) atau scan..." className="w-full pl-10 pr-12 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:border-indigo-400 font-bold outline-none text-sm shadow-inner transition-all" autoComplete="off" />
                                                                <button type="button" onClick={() => { setScannerTarget('mutasi'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-100 p-2 rounded-lg transition-all"><Icon name="camera" size={16}/></button>
                                                                {scanSuggestions.length > 0 && !detectedItem && (
                                                                    <ul className="absolute z-50 w-full bg-white border border-slate-200 shadow-2xl rounded-xl mt-1 max-h-48 overflow-y-auto no-scrollbar divide-y divide-slate-100">
                                                                        {scanSuggestions.map((item, idx) => (
                                                                            <li key={item.id} id={`scan-suggest-${idx}`} onMouseEnter={() => setActiveScanSuggestionIndex(idx)} onClick={() => { setScanBarcode(item.name); setScanSuggestions([]); setActiveScanSuggestionIndex(-1); }} className={`p-3 cursor-pointer text-left transition-colors ${activeScanSuggestionIndex === idx ? 'bg-indigo-100' : 'hover:bg-indigo-50'}`}>
                                                                                <p className={`font-bold text-xs truncate ${activeScanSuggestionIndex === idx ? 'text-indigo-900' : 'text-slate-800'}`}>{item.name}</p>
                                                                                <p className={`text-[9px] mt-0.5 uppercase tracking-widest ${activeScanSuggestionIndex === idx ? 'text-indigo-700' : 'text-indigo-500'}`}>Sisa: {item.stok} Bks | Barcode: {item.bBungkus !== 'undefined' && item.bBungkus ? item.bBungkus : '-'}</p>
                                                                            </li>
                                                                        ))}
                                                                    </ul>
                                                                )}
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <input required type="number" min="1" placeholder="Qty" value={scanQty} onChange={(e)=>setScanQty(e.target.value)} className="w-20 px-2 py-3 bg-slate-50 border border-slate-200 rounded-xl text-center font-black text-lg outline-none shadow-inner" />
                                                                <div className="w-24 relative">
                                                                    <select value={scanUom} onChange={(e)=>setScanUom(e.target.value)} className="w-full h-full px-3 py-3 bg-white border border-slate-200 rounded-xl font-bold text-[10px] text-slate-700 outline-none cursor-pointer appearance-none shadow-sm">
                                                                        <option value="Bungkus">Bks</option><option value="Slop">Pak</option><option value="Bal">Bal</option>
                                                                    </select>
                                                                    <Icon name="chevron-right" className="absolute right-2 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none" size={14}/>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    {scanType === 'ADJUST' && (
                                                        <div className="bg-indigo-50 p-4 rounded-2xl border border-indigo-100 animate-in zoom-in-95">
                                                            <div className="flex gap-3 mb-4">
                                                                <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all ${adjustDir === 'MINUS' ? 'bg-rose-100 border-rose-300 text-rose-900 shadow-sm' : 'bg-white border-transparent text-slate-500 hover:bg-rose-50'}`}>
                                                                    <input type="radio" name="adjDir" checked={adjustDir === 'MINUS'} onChange={() => setAdjustDir('MINUS')} className="hidden"/>
                                                                    <Icon name="trending-down" size={16} /><span className="text-[10px] font-black uppercase">KURANGI (-)</span>
                                                                </label>
                                                                <label className={`flex-1 flex items-center justify-center gap-2 p-3 rounded-xl border-2 cursor-pointer transition-all ${adjustDir === 'PLUS' ? 'bg-emerald-100 border-emerald-300 text-emerald-900 shadow-sm' : 'bg-white border-transparent text-slate-500 hover:bg-emerald-50'}`}>
                                                                    <input type="radio" name="adjDir" checked={adjustDir === 'PLUS'} onChange={() => setAdjustDir('PLUS')} className="hidden"/>
                                                                    <Icon name="trending-up" size={16} /><span className="text-[10px] font-black uppercase">TAMBAH (+)</span>
                                                                </label>
                                                            </div>
                                                            <input required type="text" value={scanNote} onChange={(e)=>setScanNote(e.target.value)} placeholder="Alasan Penyesuaian..." className="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:border-indigo-400 text-xs font-medium outline-none" />
                                                        </div>
                                                    )}
                                                    <div className="min-h-[60px]">
                                                        {detectedItem ? (
                                                            <div className="p-4 bg-indigo-600 rounded-2xl text-white shadow-md flex items-center gap-4 animate-in slide-in-from-top-2">
                                                                <div className="bg-white/20 p-2 rounded-xl shrink-0"><Icon name="check-circle-2" size={24} /></div>
                                                                <div className="overflow-hidden">
                                                                    <p className="text-[9px] font-bold uppercase opacity-80 tracking-widest mb-0.5">TERDETEKSI</p>
                                                                    <p className="text-sm font-black tracking-tight truncate">{detectedItem.name}</p>
                                                                </div>
                                                            </div>
                                                        ) : scanBarcode.length > 0 && scanSuggestions.length === 0 ? (
                                                            <div className="p-4 bg-rose-50 border border-rose-200 rounded-2xl flex items-center gap-3">
                                                                <Icon name="server-crash" size={20} className="text-rose-600" />
                                                                <p className="text-[10px] font-black text-rose-800 uppercase tracking-widest">Produk tidak terdaftar!</p>
                                                            </div>
                                                        ) : null}
                                                    </div>
                                                    <button type="submit" disabled={!detectedItem || isSyncing || !scanQty} className="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-black transition-all disabled:opacity-30 text-xs uppercase tracking-widest">SIMPAN MUTASI</button>
                                                </form>
                                            </div>
                                        </div>
                                        <div className="w-full md:w-1/3">
                                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-full min-h-[300px]">
                                                <h3 className="font-black text-slate-800 text-sm mb-5 flex items-center gap-2 uppercase tracking-widest shrink-0"><Icon name="history" size={16} className="text-indigo-500" /> Riwayat Mutasi Terkini</h3>
                                                <div className="space-y-4 overflow-y-auto no-scrollbar flex-1">
                                                    {globalRecentMutasi.map((t, i) => (
                                                        <div key={i} className="flex items-center justify-between border-b border-slate-100 pb-4 last:border-0 last:pb-0">
                                                            <div className="min-w-0 pr-4">
                                                                <p className="font-bold text-slate-800 text-sm truncate">{t.item}</p>
                                                                <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase tracking-widest">{t.time} • @{t.user}</p>
                                                            </div>
                                                            <div className={`shrink-0 px-2.5 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest ${t.type === 'IN' ? 'bg-emerald-100 text-emerald-800' : t.type === 'OUT' ? 'bg-orange-100 text-orange-800' : 'bg-indigo-100 text-indigo-800'}`}>
                                                                {t.type === 'OUT' ? '-' : '+'}{t.qty} <span className="opacity-50">{t.uom.substring(0,3)}</span>
                                                            </div>
                                                        </div>
                                                    ))}
                                                    {globalRecentMutasi.length === 0 && <p className="text-xs font-bold text-slate-400 uppercase tracking-widest text-center py-4">Belum ada transaksi</p>}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* OPNAME VIEW (FIXED IPAD SCROLLING & PAGINATION) */}
                            {activeMenu === 'opname' && (
                                <div className="fade-in flex flex-col h-full w-full gap-4 min-h-0 pb-4">
                                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 shrink-0">
                                        <h2 className="text-2xl font-black italic uppercase text-slate-800 tracking-tighter">Audit Fisik</h2>
                                        <div className="flex items-center gap-2 bg-white p-2 rounded-xl border border-slate-200 shadow-sm w-full md:w-auto">
                                            <Icon name="search" size={16} className="text-slate-400 ml-2"/>
                                            <input placeholder="Cari barang..." className="bg-transparent border-none outline-none font-bold text-xs w-full md:w-64 px-1" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                                        </div>
                                    </div>

                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col flex-1 min-h-0">

                                                <tr><th className="px-6 py-4">USERNAME</th><th className="px-6 py-4 text-center">ROLE</th><th className="px-6 py-4 text-center">AKSI</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-bold text-sm">
                                                {liveData?.users?.map((u,i)=>(
                                                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                        <td className="px-6 py-4 flex items-center gap-4"><div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-black text-lg ${u.role==='ADMIN'?'bg-indigo-500':'bg-slate-400'}`}>{u.username[0].toUpperCase()}</div>{u.username}</td>
                                                        <td className="px-6 py-4 text-center"><span className={`px-4 py-2 rounded-lg text-[9px] uppercase font-black tracking-widest ${u.role==='ADMIN'?'bg-indigo-50 text-indigo-700':'bg-slate-100 text-slate-500'}`}>{u.role}</span></td>
                                                        <td className="px-6 py-4 text-center space-x-2">
                                                            <button onClick={()=>{setNewUser({ oldUsername: u.username, username: u.username, password: u.password, role: u.role }); setIsEditUserMode(true); setIsUserModalOpen(true);}} className="p-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Icon name="edit" size={16}/></button>
                                                            {u.username !== 'admin' && <button onClick={()=>setDeleteUserTarget(u.username)} className="p-3 bg-slate-100 text-slate-500 rounded-xl hover:bg-rose-600 hover:text-white transition-all shadow-sm"><Icon name="trash-2" size={16}/></button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* --- MODAL SCANNER KAMERA --- */}
                    {isScannerOpen && (
                        <div className="fixed inset-0 bg-slate-900/90 z-[500] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-md flex flex-col overflow-hidden text-slate-800">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <h3 className="font-black text-lg italic uppercase text-slate-800 flex items-center gap-2"><Icon name="scan" size={20}/> Scanner Kamera</h3>
                                    <button onClick={()=>setIsScannerOpen(false)} className="p-2 bg-rose-50 text-rose-500 rounded-xl hover:bg-rose-100 transition-colors"><Icon name="x" size={20} /></button>
                                </div>
                                <div className="p-6">
                                    <div id="reader" className="w-full rounded-2xl overflow-hidden border-2 border-indigo-100"></div>
                                    <p className="text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest mt-6">Arahkan kamera ke Barcode</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL ADD MASTER --- */}
                    {isAddMasterOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-[2rem] shadow-2xl max-w-xl w-full flex flex-col max-h-[90vh] text-slate-800">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <h3 className="font-black text-lg italic uppercase text-slate-800">{isEditMode ? 'Edit Data Produk' : 'Pendaftaran Produk'}</h3>
                                    <button onClick={()=>setIsAddMasterOpen(false)} className="p-2 hover:bg-rose-100 rounded-xl transition-colors"><Icon name="x" size={20} className="text-slate-500"/></button>
                                </div>
                                <div className="p-6 overflow-y-auto space-y-6 no-scrollbar flex-1">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div className="space-y-1.5"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">SKU ID</label><input value={newMaster.idBarang} onChange={e=>setNewMaster({...newMaster, idBarang: e.target.value})} disabled={isEditMode} className="w-full p-4 bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-400 rounded-xl font-bold transition-all outline-none text-sm" /></div>
                                        <div className="space-y-1.5"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Nama Barang</label><input value={newMaster.namaBarang} onChange={e=>setNewMaster({...newMaster, namaBarang: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-400 rounded-xl font-bold transition-all outline-none text-sm" /></div>
                                    </div>
                                    <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-3">
                                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest text-center mb-2 italic">Registrasi Barcode</p>
                                        
                                        <div className="relative">
                                            <input value={newMaster.barcodeBungkus} onChange={e=>setNewMaster({...newMaster, barcodeBungkus: e.target.value})} placeholder="Barcode Bungkus" className="w-full pl-4 pr-12 py-3 bg-white border border-slate-200 rounded-lg font-mono text-xs outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_bungkus'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-1.5 rounded-md transition-all"><Icon name="camera" size={16}/></button>
                                        </div>

                                        <div className="relative">
                                            <input value={newMaster.barcodeSlop} onChange={e=>setNewMaster({...newMaster, barcodeSlop: e.target.value})} placeholder="Barcode Pak" className="w-full pl-4 pr-12 py-3 bg-white border border-slate-200 rounded-lg font-mono text-xs outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_slop'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-1.5 rounded-md transition-all"><Icon name="camera" size={16}/></button>
                                        </div>

                                        <div className="relative">
                                            <input value={newMaster.barcodeBal} onChange={e=>setNewMaster({...newMaster, barcodeBal: e.target.value})} placeholder="Barcode Bal" className="w-full pl-4 pr-12 py-3 bg-white border border-slate-200 rounded-lg font-mono text-xs outline-none focus:border-indigo-400 shadow-sm" />
                                            <button type="button" onClick={() => { setScannerTarget('master_bal'); setIsScannerOpen(true); }} className="absolute right-2 top-1/2 -translate-y-1/2 text-indigo-600 hover:text-indigo-800 bg-indigo-50 p-1.5 rounded-md transition-all"><Icon name="camera" size={16}/></button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="space-y-1.5 text-center"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">1 Pak = .. Bks</label><input type="number" value={newMaster.isiSlop} onChange={e=>setNewMaster({...newMaster, isiSlop: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-center font-black text-lg outline-none focus:border-indigo-400" /></div>
                                        <div className="space-y-1.5 text-center"><label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">1 Bal = .. Pak</label><input type="number" value={newMaster.isiBal} onChange={e=>setNewMaster({...newMaster, isiBal: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl text-center font-black text-lg outline-none focus:border-indigo-400" /></div>
                                    </div>
                                </div>
                                <div className="p-6 border-t border-slate-100 bg-white shrink-0"><button onClick={simpanMaster} disabled={isSyncing} className="w-full bg-slate-900 text-white font-black py-4 rounded-xl uppercase tracking-widest shadow-xl active:scale-95 transition-all disabled:opacity-50 text-xs">Simpan Database</button></div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL ADD USER --- */}
                    {isUserModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-[2rem] shadow-2xl max-w-sm w-full flex flex-col border border-slate-100 overflow-hidden text-slate-800">
                                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0">
                                    <h3 className="font-black text-lg italic uppercase text-slate-800">{isEditUserMode ? 'Edit Akses' : 'Akses Baru'}</h3>
                                    <button onClick={()=>setIsUserModalOpen(false)} className="p-2 hover:bg-rose-100 rounded-xl transition-colors"><Icon name="x" size={20} className="text-slate-500"/></button>
                                </div>
                                <div className="p-6 space-y-4 text-left">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Username Login</label>
                                        <input value={newUser.username} onChange={e=>setNewUser({...newUser, username: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-400 rounded-xl font-bold outline-none transition-all text-sm" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Password Baru</label>
                                        <input type="text" value={newUser.password} onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-400 rounded-xl font-bold outline-none transition-all text-sm" />
                                    </div>
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Tingkat Otoritas</label>
                                        <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-200 focus:bg-white focus:border-indigo-500 rounded-xl font-bold outline-none cursor-pointer appearance-none text-sm">
                                            <option value="ADMIN">Super Admin</option><option value="STAFF">Staf Gudang</option>
                                        </select>
                                    </div>
                                    <button onClick={async ()=>{await apiCall({action: isEditUserMode ? 'edit_user' : 'add_user', ...newUser}); setIsUserModalOpen(false); setCustomAlert("Akses diperbarui.");}} className="w-full bg-indigo-600 text-white font-black py-4 rounded-xl shadow-lg active:scale-95 transition-all uppercase tracking-widest text-[10px] mt-2">Konfirmasi Akses</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-6 rounded-[2rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-rose-50 text-rose-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="trash-2" size={32}/></div>
                                <h3 className="font-black text-xl mb-2 tracking-tight italic uppercase">Hapus Barang?</h3>
                                <p className="text-slate-500 text-xs mb-6 leading-relaxed font-medium">Data yang sudah dihapus tidak dapat dikembalikan.</p>
                                <div className="flex gap-3">
                                    <button onClick={()=>setDeleteTarget(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={hapusMaster} className="flex-1 py-3 bg-rose-600 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-md shadow-rose-200 hover:bg-rose-700 transition-colors">Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteUserTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-6 rounded-[2rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-orange-50 text-orange-600 rounded-full flex items-center justify-center mx-auto mb-4"><Icon name="users" size={32}/></div>
                                <h3 className="font-black text-xl mb-2 tracking-tight italic uppercase">Cabut Akses?</h3>
                                <p className="text-slate-500 text-xs mb-6 leading-relaxed font-medium">Hapus perijinan akses untuk {deleteUserTarget}?</p>
                                <div className="flex gap-3">
                                    <button onClick={()=>setDeleteUserTarget(null)} className="flex-1 py-3 bg-slate-100 text-slate-600 rounded-xl font-bold uppercase text-[10px] tracking-widest hover:bg-slate-200 transition-colors">Batal</button>
                                    <button onClick={async ()=>{await apiCall({action: 'delete_user', username: deleteUserTarget}); setDeleteUserTarget(null); setCustomAlert("Akses dicabut.");}} className="flex-1 py-3 bg-orange-600 text-white rounded-xl font-bold uppercase text-[10px] tracking-widest shadow-md shadow-orange-200 hover:bg-orange-700 transition-colors">Cabut</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl max-w-xs w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="check-circle-2" size={32} /></div>
                                <h3 className="font-black text-slate-800 text-xl mb-2 italic uppercase tracking-tight">Terupdate</h3>
                                <p className="text-slate-500 text-xs font-medium mb-8 leading-relaxed tracking-wide">{customAlert}</p>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white font-black py-4 rounded-xl uppercase text-[10px] tracking-widest shadow-lg hover:bg-black transition-all">Selesai</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
