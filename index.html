<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grosir Pintar POS v2.5</title>
    <!-- Tailwind CSS untuk Desain Modern -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel untuk menjalankan JSX di Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        /**
         * Komponen Icon yang Aman untuk React 18.
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            // --- KONFIGURASI URL API ---
            const API_URL = "https://script.google.com/macros/s/AKfycbwolB1qiZh8mTgngPufaSiYHfu8LcDYBf_kQjueOxAme-ADXZq8WGS6xEYiB0ilfMSQ/exec";

            // --- STATE AUTH ---
            const [currentUser, setCurrentUser] = useState(localStorage.getItem('pos_user') || '');
            const [userRole, setUserRole] = useState(localStorage.getItem('pos_role') || 'ADMIN');
            const [isLoggedIn, setIsLoggedIn] = useState(!!localStorage.getItem('pos_user'));
            const [loginName, setLoginName] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            // --- STATE UTAMA ---
            const [activeMenu, setActiveMenu] = useState(() => localStorage.getItem('pos_role') === 'STAFF' ? 'opname' : 'dashboard');
            const [liveData, setLiveData] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(true);
            const [isCheckingSystem, setIsCheckingSystem] = useState(true);
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');

            // Tracker Sinkronisasi untuk Auto-Refresh & Anti Double-Submit
            const syncRef = useRef(false);

            // --- STATE FORM & MODAL ---
            const [scanBarcode, setScanBarcode] = useState('');
            const [scanType, setScanType] = useState('IN');
            const [adjustDir, setAdjustDir] = useState('MINUS');
            const [scanQty, setScanQty] = useState(1);
            const [scanUom, setScanUom] = useState('Bungkus');
            const [scanNote, setScanNote] = useState('');
            
            const [opnameBarcode, setOpnameBarcode] = useState('');
            const [opnameQty, setOpnameQty] = useState('');
            const [opnameUom, setOpnameUom] = useState('Bungkus');
            
            // Pencarian Cepat (Ketik Nama)
            const [detectedItem, setDetectedItem] = useState(null);
            const [scanSuggestions, setScanSuggestions] = useState([]);
            
            const [opnameItem, setOpnameItem] = useState(null);
            const [opnameSuggestions, setOpnameSuggestions] = useState([]);

            const [filterDate, setFilterDate] = useState('');
            const [filterType, setFilterType] = useState('ALL');
            const [activeReportTab, setActiveReportTab] = useState('mutasi');
            const [kartuStokItem, setKartuStokItem] = useState('');

            const [customAlert, setCustomAlert] = useState(null);
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [deleteUserTarget, setDeleteUserTarget] = useState(null);
            const [isAddMasterOpen, setIsAddMasterOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [newMaster, setNewMaster] = useState({ idBarang: '', namaBarang: '', barcodeBungkus: '', barcodeSlop: '', barcodeBal: '', isiSlop: 12, isiBal: 10, stokAwal: 0 });
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [isEditUserMode, setIsEditUserMode] = useState(false);
            const [newUser, setNewUser] = useState({ oldUsername: '', username: '', password: '', role: 'STAFF' });

            const barcodeInputRef = useRef(null);

            // --- DATA FETCHING (AUTO-REFRESH TIAP 10 DETIK) ---
            const fetchData = async (silent = false) => {
                if (!API_URL.startsWith("http")) { setIsSyncing(false); return; }
                if (syncRef.current && silent) return; 
                
                syncRef.current = true;
                if (!silent) setIsLoading(true);
                setIsSyncing(true);
                
                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    setLiveData(data);
                } catch (e) { console.error("Auto-sync error:", e); }
                finally { 
                    setIsLoading(false); 
                    setIsSyncing(false); 
                    setIsCheckingSystem(false); 
                    syncRef.current = false;
                }
            };

            useEffect(() => { 
                fetchData(); 
                const interval = setInterval(() => { fetchData(true); }, 10000);
                return () => clearInterval(interval);
            }, []);

            // --- LOGIKA PENCARIAN CEPAT & BARCODE ---
            const findItemExact = (inputStr) => {
                const clean = String(inputStr).trim().toLowerCase();
                if (!clean || !liveData?.masterItems) return null;
                for (let item of liveData.masterItems) {
                    if (String(item.bBungkus).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                    if (String(item.bSlop).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Slop' };
                    if (String(item.bBal).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bal' };
                    if (String(item.name).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                    if (String(item.id).trim().toLowerCase() === clean) return { ...item, defaultUom: 'Bungkus' };
                }
                return null;
            };

            // Efek untuk Scanner Mutasi Gudang
            useEffect(() => {
                const found = findItemExact(scanBarcode);
                setDetectedItem(found);
                if(found) {
                    setScanUom(found.defaultUom);
                    setScanSuggestions([]);
                } else {
                    const lowerInput = scanBarcode.toLowerCase().trim();
                    if(lowerInput.length > 0) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || 
                            String(i.id).toLowerCase().includes(lowerInput) ||
                            String(i.bBungkus).includes(lowerInput)
                        ).slice(0, 5) || [];
                        setScanSuggestions(suggestions);
                    } else {
                        setScanSuggestions([]);
                    }
                }
            }, [scanBarcode, liveData]);

            // Efek untuk Scanner Stok Opname
            useEffect(() => {
                const found = findItemExact(opnameBarcode);
                setOpnameItem(found);
                if(found) {
                    setOpnameUom(found.defaultUom);
                    setOpnameSuggestions([]);
                } else {
                    const lowerInput = opnameBarcode.toLowerCase().trim();
                    if(lowerInput.length > 0) {
                        const suggestions = liveData?.masterItems?.filter(i => 
                            String(i.name).toLowerCase().includes(lowerInput) || 
                            String(i.id).toLowerCase().includes(lowerInput) ||
                            String(i.bBungkus).includes(lowerInput)
                        ).slice(0, 5) || [];
                        setOpnameSuggestions(suggestions);
                    } else {
                        setOpnameSuggestions([]);
                    }
                }
            }, [opnameBarcode, liveData]);

            // --- LOGIKA FILTER PENCARIAN (TABEL) ---
            const filteredMasterItems = (liveData?.masterItems || []).filter(i => 
                i.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                i.id.toLowerCase().includes(searchTerm.toLowerCase()) ||
                String(i.bBungkus).includes(searchTerm) ||
                String(i.bSlop).includes(searchTerm) ||
                String(i.bBal).includes(searchTerm)
            );
            
            const filteredTransactions = (liveData?.transactions || []).filter(t => {
                const mSearch = t.item.toLowerCase().includes(searchTerm.toLowerCase()) || t.user.toLowerCase().includes(searchTerm.toLowerCase());
                const mDate = filterDate ? t.date === filterDate : true;
                let mType = true;
                if (filterType === 'IN') mType = t.type === 'IN' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'OUT') mType = t.type === 'OUT' && !t.id.startsWith('OPN-') && !t.note.includes('ADJUST');
                if (filterType === 'ADJUST') mType = t.id.startsWith('OPN-') || t.note.includes('ADJUST');
                return mSearch && mDate && mType;
            });

            const filteredLowStock = (liveData?.lowStock || []).filter(item => 
                item.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            // Perhitungan Mundur Kartu Stok
            const getKartuStokData = () => {
                if (!kartuStokItem) return [];
                const selectedItemData = liveData?.masterItems?.find(i => i.id === kartuStokItem);
                if (!selectedItemData) return [];
                
                let currentSisa = selectedItemData.stok || 0;
                const logs = [...(liveData?.transactions || [])].filter(t => t.item === selectedItemData.name);
                
                return logs.map(trx => {
                    let qtyBase = Number(trx.qty);
                    if (trx.uom === 'Bal') qtyBase = Number(trx.qty) * selectedItemData.isiSlop * selectedItemData.isiBal;
                    if (trx.uom === 'Slop') qtyBase = Number(trx.qty) * selectedItemData.isiSlop;
                    
                    const isMasuk = trx.type === 'IN';
                    const isKeluar = trx.type === 'OUT';
                    
                    const row = {
                        ...trx,
                        masukBase: isMasuk ? qtyBase : 0,
                        keluarBase: isKeluar ? qtyBase : 0,
                        sisa: currentSisa
                    };
                    if (isMasuk) currentSisa -= qtyBase;
                    if (isKeluar) currentSisa += qtyBase;
                    return row;
                });
            };

            // --- HANDLERS UTAMA ---
            const handleLogin = (e) => {
                e.preventDefault();
                const found = liveData?.users?.find(u => u.username.toLowerCase() === loginName.trim().toLowerCase() && u.password === loginPassword);
                if (found) {
                    localStorage.setItem('pos_user', found.username);
                    localStorage.setItem('pos_role', found.role);
                    setCurrentUser(found.username);
                    setUserRole(found.role);
                    setIsLoggedIn(true);
                    setActiveMenu(found.role === 'STAFF' ? 'opname' : 'dashboard');
                } else { setLoginError("ID atau PIN tidak terdaftar!"); }
            };

            const handleLogout = () => {
                localStorage.clear();
                location.reload();
            };

            const apiCall = async (payload) => {
                syncRef.current = true;
                setIsSyncing(true);
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    const result = await res.json();
                    if(result.status === 'success') {
                        syncRef.current = false;
                        fetchData(true);
                        return true;
                    }
                } catch(e) { console.error("API Call error:", e); }
                
                syncRef.current = false;
                fetchData(true);
                return false;
            };

            // ⚡ OPTIMISTIC UI: HAPUS FORM SECARA INSTAN
            const simpanScan = async (e) => {
                e.preventDefault();
                if(syncRef.current || !detectedItem) return;
                
                const payload = { action: 'scan', barcode: detectedItem.id, type: scanType === 'ADJUST' ? (adjustDir === 'MINUS' ? 'OUT' : 'IN') : scanType, qty: scanQty, uom: scanUom, user: currentUser, note: scanType === 'ADJUST' ? `ADJUST: ${scanNote}` : '' };
                
                // Hapus form 0 detik
                setScanBarcode(''); setScanQty(1); setScanNote('');
                setDetectedItem(null); setScanSuggestions([]);
                
                await apiCall(payload);
            };

            const simpanOpname = async (e) => {
                e.preventDefault();
                if(syncRef.current || !opnameItem) return;
                
                const payload = { action: 'opname', barcode: opnameItem.id, qty: opnameQty, uom: opnameUom, user: currentUser };
                
                // Hapus form 0 detik
                setOpnameBarcode(''); setOpnameQty('');
                setOpnameItem(null); setOpnameSuggestions([]);
                if(barcodeInputRef.current) barcodeInputRef.current.focus();

                await apiCall(payload);
            };

            const simpanMaster = async (e) => {
                e.preventDefault();
                if (syncRef.current) return;
                const success = await apiCall({ action: isEditMode ? 'edit_master' : 'add_master', ...newMaster });
                if(success) { setIsAddMasterOpen(false); setCustomAlert("Data Master Berhasil Disimpan!"); }
            };

            const hapusMaster = async () => {
                if (syncRef.current) return;
                const success = await apiCall({ action: 'delete_master', idBarang: deleteTarget });
                if(success) { setDeleteTarget(null); setCustomAlert("Produk telah dihapus."); }
            };

            const handleExportCSV = (type) => {
                let csvRows = [];
                let filename = "";
                
                if (type === 'mutasi') {
                    const headers = ["Tanggal", "Waktu", "Tipe", "Produk", "Jumlah", "Satuan", "Operator", "Catatan"];
                    csvRows = [headers.join(","), ...filteredTransactions.map(t => `"${t.date}","${t.time}","${t.type}","${t.item}","${t.qty}","${t.uom}","${t.user}","${t.note}"`)];
                    filename = `Mutasi_Harian_${new Date().toISOString().split('T')[0]}.csv`;
                } else if (type === 'rekap_selisih') {
                    const headers = ["Nama Produk", "SKU", "Status", "Sistem", "Fisik", "Selisih"];
                    csvRows = [headers.join(","), ...(filteredMasterItems).map(i => {
                        const isDone = i.opnamedToday;
                        const selisih = i.selisihOpname;
                        const fisik = isDone ? i.stok : '-';
                        const stokSistemSebelum = isDone ? (i.stok - selisih) : i.stok;
                        return `"${i.name}","${i.id}","${isDone ? 'SELESAI' : 'BELUM'}","${stokSistemSebelum}","${fisik}","${isDone ? selisih : '-'}"`
                    })];
                    filename = `Laporan_Selisih_Opname_${new Date().toISOString().split('T')[0]}.csv`;
                } else if (type === 'kartu') {
                    if (!kartuStokItem) return setCustomAlert("Pilih barang terlebih dahulu di menu dropdown Kartu Stok.");
                    const kartuData = getKartuStokData();
                    const selectedItem = liveData?.masterItems?.find(i => i.id === kartuStokItem);
                    const headers = ["Tanggal", "Waktu", "No Bukti", "Keterangan", "Masuk (Bks)", "Keluar (Bks)", "Sisa Saldo (Bks)", "Operator"];
                    csvRows = [headers.join(","), ...kartuData.map(t => `"${t.date}","${t.time}","${t.id}","${t.note}","${t.masukBase}","${t.keluarBase}","${t.sisa}","${t.user}"`)];
                    filename = `Kartu_Stok_${selectedItem?.name}.csv`;
                }
                
                if (csvRows.length <= 1) return setCustomAlert("Data kosong atau belum dipilih.");
                const blob = new Blob([csvRows.join("\n")], { type: "text/csv" });
                const a = document.createElement("a"); a.href = window.URL.createObjectURL(blob); a.download = filename; a.click();
            };

            const getStokInfo = (bks, iS, iB) => {
                if (bks === 0) return "Kosong";
                const bPerBal = iS * iB;
                const bal = Math.floor(bks / bPerBal);
                const sB = bks % bPerBal;
                const slop = Math.floor(sB / iS);
                const bungkus = sB % iS;
                let res = [];
                if (bal > 0) res.push(`${bal} Bal`);
                if (slop > 0) res.push(`${slop} Slop`);
                if (bungkus > 0) res.push(`${bungkus} Bks`);
                return res.join(" + ");
            };

            // --- UI: LOGIN VIEW ---
            if (!isLoggedIn) {
                return (
                    <div className="flex h-screen items-center justify-center p-6 bg-slate-100 relative overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-30">
                            <div className="absolute top-0 left-0 w-96 h-96 bg-indigo-400 rounded-full blur-3xl -translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 right-0 w-96 h-96 bg-blue-400 rounded-full blur-3xl translate-x-1/2 translate-y-1/2"></div>
                        </div>
                        <div className="bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl w-full max-w-md border border-slate-100 z-10 fade-in text-center text-slate-800">
                            <div className="flex justify-center mb-10"><div className="bg-indigo-600 p-6 rounded-[2rem] text-white shadow-xl shadow-indigo-100"><Icon name="shield-check" size={40}/></div></div>
                            <h1 className="text-3xl font-black tracking-tighter uppercase italic">Grosir Pintar</h1>
                            <p className="text-slate-400 mb-10 text-[10px] font-bold tracking-[0.3em] uppercase">Enterprise Hub v2.5</p>
                            {isCheckingSystem ? <div className="py-10"><Icon name="refresh-cw" className="animate-spin text-indigo-500 mx-auto" size={32}/><p className="mt-4 font-bold text-slate-400 uppercase text-[10px]">Menyambungkan Database...</p></div> : (
                                <form onSubmit={handleLogin} className="space-y-6 text-left">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">ID Login</label>
                                        <input required placeholder="Username" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginName} onChange={e=>setLoginName(e.target.value)} />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2">Sandi / PIN</label>
                                        <input required type="password" placeholder="Password" className="w-full p-5 bg-slate-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-indigo-500 font-bold outline-none transition-all" value={loginPassword} onChange={e=>setLoginPassword(e.target.value)} />
                                    </div>
                                    {loginError && <p className="text-rose-500 text-xs font-bold text-center bg-rose-50 p-3 rounded-xl">{loginError}</p>}
                                    <button className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-lg hover:bg-indigo-700 transition-all uppercase tracking-widest active:scale-95">Masuk Sistem</button>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            const menuList = [
                { id: 'dashboard', label: 'DASHBOARD', icon: 'layout-dashboard', role: 'ADMIN' },
                { id: 'gudang', label: 'MUTASI GUDANG', icon: 'scan-barcode', role: 'ADMIN' },
                { id: 'opname', label: 'STOK OPNAME', icon: 'clipboard-list', role: 'ALL' },
                { id: 'inventory', label: 'MASTER BARANG', icon: 'package', role: 'ADMIN' },
                { id: 'transactions', label: 'PUSAT LAPORAN', icon: 'file-spreadsheet', role: 'ADMIN' },
                { id: 'users', label: 'MANAJEMEN USER', icon: 'users', role: 'ADMIN' },
            ].filter(m => m.role === 'ALL' || userRole === 'ADMIN');

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* SIDEBAR */}
                    {isMobileMenuOpen && <div className="absolute inset-0 bg-slate-900/60 z-40 md:hidden backdrop-blur-sm" onClick={()=>setIsMobileMenuOpen(false)}></div>}
                    <aside className={`absolute md:relative z-50 w-72 h-full bg-indigo-950 text-white flex flex-col shadow-2xl transition-transform duration-500 ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shrink-0`}>
                        <div className="p-10 border-b border-white/5 flex flex-col items-center">
                            <Icon name="warehouse" size={48} className="text-indigo-400 mb-4" />
                            <h1 className="font-black text-xl italic tracking-tighter text-white">GROSIR PINTAR</h1>
                            <p className="text-[9px] font-bold text-indigo-400/50 uppercase tracking-[0.4em] mt-1">Version 2.5</p>
                        </div>
                        <nav className="flex-1 p-6 space-y-2 overflow-y-auto no-scrollbar">
                            {menuList.map(m => (
                                <button key={m.id} onClick={()=>{setActiveMenu(m.id); setIsMobileMenuOpen(false);}} className={`w-full flex items-center gap-4 p-5 rounded-[1.2rem] font-black text-[10px] tracking-widest transition-all ${activeMenu === m.id ? 'bg-white text-indigo-900 shadow-xl scale-[1.03]' : 'text-indigo-200/40 hover:text-white hover:bg-white/5'}`}>
                                    <Icon name={m.icon} size={18} /> {m.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-6 border-t border-white/5">
                            <div className="bg-white/5 p-5 rounded-[1.5rem] flex items-center justify-between">
                                <div className="min-w-0 pr-2"><p className="text-[10px] font-black truncate">{currentUser.toUpperCase()}</p><p className="text-[8px] font-bold text-indigo-400 uppercase">{userRole === 'ADMIN' ? 'Owner' : 'Operator'}</p></div>
                                <button onClick={handleLogout} className="text-white/20 hover:text-rose-400 transition-colors"><Icon name="log-out" size={18}/></button>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col bg-white overflow-hidden">
                        <header className="p-6 md:p-8 border-b border-slate-50 flex justify-between items-center bg-white z-10 shrink-0">
                            <div className="flex items-center gap-4 flex-1 w-full md:w-auto">
                                <button className="md:hidden text-slate-400" onClick={()=>setIsMobileMenuOpen(true)}><Icon name="menu" size={28}/></button>
                                <div className="flex-1 md:flex-none md:max-w-md relative">
                                    <div className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-300"><Icon name="search" size={18}/></div>
                                    <input placeholder="Cari Data Master & Laporan..." className="w-full pl-12 pr-6 py-4 bg-slate-50 rounded-[1.5rem] border border-slate-100 outline-none focus:ring-4 ring-indigo-50 font-bold text-xs" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} />
                                </div>
                            </div>
                            <div className={`hidden md:flex items-center px-5 py-2.5 rounded-2xl text-[10px] font-black tracking-widest border ${isSyncing ? 'bg-indigo-50 border-indigo-100 text-indigo-600 animate-pulse' : 'bg-emerald-50 border-emerald-100 text-emerald-600'}`}>
                                <Icon name="database" size={14} className="mr-2"/> {isSyncing ? 'SINKRONISASI...' : 'SERVER ONLINE'}
                            </div>
                        </header>
                        
                        <div className="flex-1 overflow-auto bg-slate-50/50 p-4 md:p-10 no-scrollbar">
                            
                            {/* DASHBOARD VIEW */}
                            {activeMenu === 'dashboard' && userRole === 'ADMIN' && (
                                <div className="fade-in space-y-10">
                                    <h2 className="text-3xl font-black tracking-tighter italic uppercase text-slate-800">Ringkasan Gudang</h2>
                                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                                        {liveData?.stats?.map((s,i) => (

                                                        <option value="ADJUST">Hanya Log Penyesuaian / Koreksi</option>
                                                    </select>
                                                    <Icon name="chevron-right" className="absolute right-0 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none" size={16}/>
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* BARANG SELECTOR FOR KARTU STOK */}
                                    {activeReportTab === 'kartu' && (
                                        <div className="bg-white p-5 md:p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                            <label className="text-[10px] font-black uppercase text-emerald-600 tracking-widest ml-2 mb-3 block">Pilih Produk Untuk Kartu Stok</label>
                                            <div className="relative">
                                                <select value={kartuStokItem} onChange={e=>setKartuStokItem(e.target.value)} className="w-full bg-slate-50 border-2 border-transparent focus:bg-white focus:border-emerald-400 p-4 md:p-5 rounded-[1.5rem] font-bold text-sm text-slate-800 outline-none cursor-pointer appearance-none transition-all">
                                                    <option value="">-- Sentuh untuk Memilih Produk --</option>
                                                    {liveData?.masterItems.map(i => <option key={i.id} value={i.id}>{i.name} (Sisa Aktual: {i.stok} Bks)</option>)}
                                                </select>
                                                <Icon name="chevron-right" className="absolute right-5 top-1/2 -translate-y-1/2 rotate-90 text-slate-400 pointer-events-none" size={20}/>
                                            </div>
                                        </div>
                                    )}

                                    <div className="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left min-w-[700px]">
                                                <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b border-slate-100">
                                                    {activeReportTab === 'mutasi' ? <tr><th className="p-8">WAKTU</th><th className="p-8 text-center">AKSI</th><th className="p-8">PRODUK</th><th className="p-8 text-right">QTY</th><th className="p-8">USER</th><th className="p-8 text-center whitespace-nowrap">CATATAN</th></tr> :
                                                     activeReportTab === 'rekap_selisih' ? <tr className="bg-rose-50 text-rose-800 border-rose-100"><th className="p-8">PRODUK</th><th className="p-8 text-center">STATUS</th><th className="p-8 text-right">SISTEM</th><th className="p-8 text-right">FISIK</th><th className="p-8 text-right">SELISIH</th></tr> :
                                                     <tr className="bg-emerald-50 text-emerald-800 border-emerald-100"><th className="p-8">TANGGAL & WAKTU</th><th className="p-8 text-right text-emerald-600">MASUK</th><th className="p-8 text-right text-orange-500">KELUAR</th><th className="p-8 text-right text-slate-800 font-black">SALDO</th><th className="p-8">KETERANGAN</th></tr>}
                                                </thead>
                                                <tbody className="divide-y divide-slate-50 text-sm font-medium">
                                                    {activeReportTab === 'mutasi' && filteredTransactions.map((t,i)=>(
                                                        <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-8 font-mono text-[11px] text-slate-400 leading-relaxed text-slate-800"><span className="block font-bold text-slate-700">{t.date}</span>{t.time}</td>
                                                            <td className="p-8 text-center"><span className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase ${t.id.startsWith('OPN-') || t.note.includes('ADJUST') ? 'bg-indigo-100 text-indigo-800' : (t.type==='IN'?'bg-emerald-100 text-emerald-800':'bg-orange-100 text-orange-800')}`}>{t.id.startsWith('OPN-')?'KOREKSI':t.type}</span></td>
                                                            <td className="p-8 font-bold text-slate-700 max-w-[200px] truncate">{t.item}</td>
                                                            <td className="p-8 text-right font-black text-slate-800 text-base">{t.type==='OUT'?'-':'+'}{t.qty} <span className="text-[9px] opacity-40 uppercase">{t.uom}</span></td>
                                                            <td className="p-8 text-[10px] font-black text-indigo-500 italic">@{t.user}</td>
                                                            <td className="p-8 text-[10px] italic text-slate-400 max-w-[150px] truncate text-center">{t.note}</td>
                                                        </tr>
                                                    ))}
                                                    {activeReportTab === 'rekap_selisih' && filteredMasterItems.map((item,i)=>(
                                                        <tr key={i} className={!item.opnamedToday ? 'opacity-40' : 'hover:bg-slate-50'}><td className="p-8 font-bold text-slate-700">{item.name}<br/><span className="text-[9px] text-slate-400 font-bold uppercase tracking-widest">{item.id}</span></td><td className="p-8 text-center"><span className={`px-4 py-2 rounded-xl text-[9px] font-black ${item.opnamedToday?'bg-emerald-100 text-emerald-800':'bg-slate-100 text-slate-400'}`}>{item.opnamedToday?'SELESAI':'BELUM'}</span></td><td className="p-8 text-right font-mono text-xs text-slate-400">{item.opnamedToday?item.stok-item.selisihOpname:item.stok}</td><td className="p-8 text-right font-black text-slate-800">{item.opnamedToday?item.stok:'-'}</td><td className="p-8 text-right font-black">{item.opnamedToday ? (item.selisihOpname===0?<span className="text-slate-300">SESUAI</span>:<span className={item.selisihOpname>0?'text-emerald-500':'text-rose-500'}>{item.selisihOpname>0?'+':''}{item.selisihOpname}</span>) : '-'}</td></tr>
                                                    ))}
                                                    {activeReportTab === 'kartu' && kartuStokItem && getKartuStokData().map((t,i)=>(
                                                        <tr key={i} className="hover:bg-slate-50"><td className="p-8 font-mono text-[11px] text-slate-400 leading-relaxed text-slate-800"><span className="block font-bold text-slate-700">{t.date}</span>{t.time}</td><td className="p-8 text-right font-black text-emerald-600 text-base">{t.masukBase > 0 ? `+${t.masukBase}` : '-'}</td><td className="p-8 text-right font-black text-orange-500 text-base">{t.keluarBase > 0 ? `-${t.keluarBase}` : '-'}</td><td className="p-8 text-right font-black text-lg bg-emerald-50/20">{t.sisa}</td><td className="p-8 text-[10px] text-slate-400 italic">@{t.user}<br/>{t.note}</td></tr>
                                                    ))}
                                                    {activeReportTab === 'kartu' && !kartuStokItem && (<tr><td colSpan="5" className="p-12 text-center text-slate-400 text-sm font-black uppercase tracking-widest italic opacity-40">Silakan pilih produk pada menu di atas.</td></tr>)}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* USER MANAGEMENT VIEW */}
                            {activeMenu === 'users' && userRole === 'ADMIN' && (
                                <div className="fade-in space-y-8">
                                    <div className="flex justify-between items-center text-slate-800">
                                        <h2 className="text-3xl font-black italic uppercase tracking-tighter">Kelola Akses</h2>
                                        <button onClick={()=>{setIsEditUserMode(false); setIsUserModalOpen(true);}} className="bg-indigo-600 text-white px-8 py-5 rounded-[2rem] font-black text-[10px] tracking-widest uppercase flex items-center gap-3 shadow-xl hover:bg-indigo-700 transition-all"><Icon name="user-plus" size={18}/> Tambah Pegawai</button>
                                    </div>
                                    <div className="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden text-slate-800">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b border-slate-100">
                                                <tr><th className="p-8">USERNAME</th><th className="p-8 text-center">ROLE</th><th className="p-8 text-center">AKSI</th></tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50 font-bold">
                                                {liveData?.users?.map((u,i)=>(
                                                    <tr key={i} className="hover:bg-slate-50 transition-colors">
                                                        <td className="p-8 flex items-center gap-4"><div className={`w-10 h-10 rounded-full flex items-center justify-center text-white font-black ${u.role==='ADMIN'?'bg-indigo-500':'bg-slate-400'}`}>{u.username[0].toUpperCase()}</div>{u.username}</td>
                                                        <td className="p-8 text-center"><span className={`px-5 py-2 rounded-xl text-[9px] uppercase font-black tracking-widest ${u.role==='ADMIN'?'bg-indigo-50 text-indigo-700':'bg-slate-100 text-slate-500'}`}>{u.role}</span></td>
                                                        <td className="p-8 text-center space-x-2">
                                                            <button onClick={()=>{setNewUser({ oldUsername: u.username, username: u.username, password: u.password, role: u.role }); setIsEditUserMode(true); setIsUserModalOpen(true);}} className="p-3 bg-slate-50 text-slate-400 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all shadow-sm"><Icon name="edit" size={16}/></button>
                                                            {u.username !== 'admin' && <button onClick={()=>setDeleteUserTarget(u.username)} className="p-3 bg-slate-50 text-slate-400 rounded-2xl hover:bg-rose-600 hover:text-white transition-all shadow-sm"><Icon name="trash-2" size={16}/></button>}
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                        </div>
                    </main>

                    {/* --- MODALS --- */}
                    {isAddMasterOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-[3rem] shadow-2xl max-w-xl w-full flex flex-col max-h-[90vh] text-slate-800">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50 shrink-0">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">{isEditMode ? 'Edit Data Produk' : 'Pendaftaran Produk'}</h3>
                                    <button onClick={()=>setIsAddMasterOpen(false)} className="p-2 hover:bg-rose-50 rounded-xl transition-colors"><Icon name="x" size={24} className="text-slate-400"/></button>
                                </div>
                                <div className="p-8 overflow-y-auto space-y-8 no-scrollbar flex-1">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">SKU ID</label><input value={newMaster.idBarang} onChange={e=>setNewMaster({...newMaster, idBarang: e.target.value})} disabled={isEditMode} className="w-full p-4 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-400 rounded-2xl font-bold transition-all outline-none" /></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nama Barang</label><input value={newMaster.namaBarang} onChange={e=>setNewMaster({...newMaster, namaBarang: e.target.value})} className="w-full p-4 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-400 rounded-2xl font-bold transition-all outline-none" /></div>
                                    </div>
                                    <div className="bg-slate-50 p-6 md:p-8 rounded-[2rem] border border-slate-100 space-y-4">
                                        <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center mb-4 italic flex items-center justify-center gap-2"><Icon name="barcode" size={16}/> Registrasi Barcode</p>
                                        <input value={newMaster.barcodeBungkus} onChange={e=>setNewMaster({...newMaster, barcodeBungkus: e.target.value})} placeholder="Barcode Bungkus" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                        <input value={newMaster.barcodeSlop} onChange={e=>setNewMaster({...newMaster, barcodeSlop: e.target.value})} placeholder="Barcode Slop" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                        <input value={newMaster.barcodeBal} onChange={e=>setNewMaster({...newMaster, barcodeBal: e.target.value})} placeholder="Barcode Bal" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-mono text-sm outline-none focus:border-indigo-400 shadow-sm" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2 text-center"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">1 Slop = .. Bks</label><input type="number" value={newMaster.isiSlop} onChange={e=>setNewMaster({...newMaster, isiSlop: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-center font-black text-xl" /></div>
                                        <div className="space-y-2 text-center"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">1 Bal = .. Slp</label><input type="number" value={newMaster.isiBal} onChange={e=>setNewMaster({...newMaster, isiBal: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl text-center font-black text-xl" /></div>
                                    </div>
                                </div>
                                <div className="p-8 border-t border-slate-50 bg-white shrink-0"><button onClick={simpanMaster} className="w-full bg-slate-900 text-white font-black py-6 rounded-[1.5rem] uppercase tracking-widest shadow-2xl active:scale-95 transition-all">Simpan Database</button></div>
                            </div>
                        </div>
                    )}

                    {isUserModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in">
                            <div className="bg-white rounded-[2.5rem] shadow-2xl max-w-sm w-full flex flex-col border border-slate-100 overflow-hidden text-slate-800">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center bg-slate-50/50 shrink-0">
                                    <h3 className="font-black text-xl italic uppercase text-slate-800">{isEditUserMode ? 'Edit Akses' : 'Akses Baru'}</h3>
                                    <button onClick={()=>setIsUserModalOpen(false)} className="p-2 hover:bg-rose-50 rounded-xl transition-colors"><Icon name="x" size={24} className="text-slate-300"/></button>
                                </div>
                                <div className="p-8 space-y-6 text-left">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Username Login</label>
                                        <input value={newUser.username} onChange={e=>setNewUser({...newUser, username: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-400 rounded-2xl font-black outline-none transition-all shadow-inner" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Password Baru</label>
                                        <input type="text" value={newUser.password} onChange={e=>setNewUser({...newUser, password: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-400 rounded-2xl font-black outline-none transition-all shadow-inner" />
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Tingkat Otoritas</label>
                                        <select value={newUser.role} onChange={e=>setNewUser({...newUser, role: e.target.value})} className="w-full p-5 bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 rounded-2xl font-black outline-none cursor-pointer appearance-none">
                                            <option value="ADMIN">Super Admin</option><option value="STAFF">Staf Gudang</option>
                                        </select>
                                    </div>
                                    <button onClick={async ()=>{await apiCall({action: isEditUserMode ? 'edit_user' : 'add_user', ...newUser}); setIsUserModalOpen(false); setCustomAlert("Akses diperbarui.");}} className="w-full bg-indigo-600 text-white font-black py-5 rounded-[1.5rem] shadow-xl active:scale-95 transition-all uppercase tracking-widest text-xs">Konfirmasi Akses</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="trash-2" size={32}/></div>
                                <h3 className="font-black text-xl mb-2 tracking-tight italic uppercase">Hapus Barang?</h3>
                                <p className="text-slate-400 text-sm mb-8 leading-relaxed">Data yang sudah dihapus tidak dapat dikembalikan. Laporan lama akan kehilangan referensi nama.</p>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteTarget(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-[10px] tracking-widest">Batal</button>
                                    <button onClick={hapusMaster} className="flex-1 py-4 bg-rose-600 text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-xl shadow-rose-200">Ya, Hapus</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteUserTarget && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[110] flex items-center justify-center p-4 backdrop-blur-sm animate-in zoom-in-95">
                            <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-orange-100 text-orange-500 rounded-full flex items-center justify-center mx-auto mb-6"><Icon name="users" size={32}/></div>
                                <h3 className="font-black text-xl mb-2 tracking-tight">Cabut Akses?</h3>
                                <p className="text-slate-400 text-sm mb-8 leading-relaxed">Hapus perijinan akses untuk <strong>{deleteUserTarget}</strong>?</p>
                                <div className="flex gap-4">
                                    <button onClick={()=>setDeleteUserTarget(null)} className="flex-1 py-4 bg-slate-100 text-slate-600 rounded-2xl font-bold uppercase text-[10px] tracking-widest">Batal</button>
                                    <button onClick={async ()=>{await apiCall({action: 'delete_user', username: deleteUserTarget}); setDeleteUserTarget(null); setCustomAlert("Akses dicabut.");}} className="flex-1 py-4 bg-orange-600 text-white rounded-2xl font-bold uppercase text-[10px] tracking-widest shadow-xl shadow-orange-200">Ya, Cabut</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {customAlert && (
                        <div className="fixed inset-0 bg-slate-900/60 z-[200] flex items-center justify-center p-4 backdrop-blur-sm animate-in fade-in">
                            <div className="bg-white p-8 md:p-10 rounded-[2.5rem] shadow-2xl max-w-sm w-full text-center border border-slate-100 text-slate-800">
                                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner"><Icon name="info" size={32} /></div>
                                <h3 className="font-black text-xl mb-3 tracking-tight italic uppercase">Informasi Sistem</h3>
                                <p className="text-slate-500 text-sm font-medium mb-8 leading-relaxed">{customAlert}</p>
                                <button onClick={()=>setCustomAlert(null)} className="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl hover:bg-black transition-all">Mengerti</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
